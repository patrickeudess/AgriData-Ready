<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriData Ready : From Raw Data to FAIR & AI-Ready Data</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<!-- PWA : installable et 100% hors-ligne -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#00345F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AfriData Ready">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<script src="libs/papaparse.min.js" defer></script>
<script src="libs/xlsx.full.min.js" defer></script>
<script src="libs/jszip.min.js" defer></script>
<script src="libs/FileSaver.min.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#263238;background:#f6fafb;min-height:100vh;display:flex}
:root{--primary:#00345F;--primary-hover:#00527A;--primary-light:#00A6B2;--accent:#FF8A00;--danger:#C62828;--warn:#F57F17;--bg:#f6fafb;--card:#fff;--soft:#E8F7F8;--soft-accent:#FFF4E5;--border:#DCEBED;--text-muted:#607D86;--radius:10px}

/* Sidebar */
.sidebar{width:260px;background:linear-gradient(180deg,#00345F 0%,#00527A 58%,#007C89 100%);color:#fff;padding:1.5rem 1rem;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.brand-logo{display:block;width:100%;max-width:220px;margin:0 auto .8rem;background:#fff;border-radius:8px;padding:.45rem;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.lang-switch{display:flex;gap:.3rem;justify-content:center;margin-bottom:1rem}
.lang-btn{background:rgba(255,255,255,.14);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:.2rem .7rem;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s}
.lang-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.lang-btn.active{background:#fff;color:var(--primary)}
.sidebar h1{font-size:1.3rem;text-align:center;margin-bottom:.3rem}
.sidebar .slogan{font-size:.75rem;text-align:center;opacity:.8;font-style:italic;margin-bottom:1.5rem}
.sidebar .nav-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-radius:8px;cursor:pointer;margin-bottom:.3rem;font-size:.85rem;transition:all .2s;color:rgba(255,255,255,.7)}
.sidebar .nav-item:hover{background:rgba(255,255,255,.15);color:#fff}
.sidebar .nav-item.active{background:rgba(255,255,255,.25);color:#fff;font-weight:700}
.sidebar .nav-item.done{color:#98EEF2}
.sidebar .nav-item .num{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.sidebar .nav-item.active .num{background:#fff;color:var(--primary)}
.sidebar .nav-item.done .num{background:#98EEF2;color:var(--primary)}
.sidebar .file-info{margin-top:1.5rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.2);font-size:.78rem;opacity:.8}
.sidebar .file-info p{margin:.2rem 0}
.founder-credit{margin-top:1.2rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.2);text-align:center;font-size:.75rem;color:rgba(255,255,255,.65);line-height:1.5}
.founder-credit strong{color:#fff;font-size:.9rem;letter-spacing:.02em}
.founder-credit span{text-transform:uppercase;letter-spacing:.08em;font-size:.65rem}

/* Main */
.main{margin-left:260px;flex:1;padding:1.5rem 2rem 3rem;min-height:100vh}
.step-view{display:none}
.step-view.active{display:block}

/* Header */
.page-header{background:linear-gradient(135deg,#00345F 0%,#006C82 58%,#00A6B2 100%);color:#fff;padding:1.5rem 2rem;border-radius:var(--radius);margin-bottom:1.5rem;text-align:center;box-shadow:0 10px 26px rgba(0,52,95,.14)}
.page-header h2{font-size:1.5rem;margin-bottom:.3rem}
.page-header p{opacity:.85;font-size:.9rem}
.welcome-hero{text-align:left;display:grid;grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);gap:1.4rem;align-items:center}
.welcome-hero h2{font-size:1.8rem}
.welcome-hero p{max-width:720px}
.welcome-panel{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);border-radius:8px;padding:1.1rem 1.2rem}
.welcome-panel strong{display:block;font-size:.9rem;margin-bottom:.6rem;color:#fff}
.welcome-panel span{display:block;font-size:.84rem;color:rgba(255,255,255,.96);margin:.3rem 0}
.mode-grid{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:1rem;max-width:980px;margin:0 auto}
.mode-card{cursor:pointer;border:1px solid var(--border);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;min-height:250px;display:flex;flex-direction:column;justify-content:space-between}
.mode-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(0,52,95,.11);border-color:var(--primary-light)}
.mode-card.static-card:hover{transform:none;box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:#EEF5F6}
.mode-card .mode-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;margin-bottom:1rem}
.mode-icon-quick{background:linear-gradient(135deg,#FF8A00,#FFB24D);box-shadow:0 6px 14px rgba(255,138,0,.28)}
.mode-icon-proj{background:linear-gradient(135deg,#00527A,#00A6B2);box-shadow:0 6px 14px rgba(0,82,122,.24)}
.mode-card h3{border:none;padding:0;margin-bottom:.6rem;font-size:1.12rem}
.mode-card p{font-size:.9rem;color:var(--text-muted);line-height:1.55;margin-bottom:1.1rem}
.mode-card .mode-points{display:grid;gap:.45rem;margin:.5rem 0 1.2rem;font-size:.82rem;color:#49666E}
.mode-card .mode-points span{display:flex;gap:.4rem;align-items:flex-start}
.trust-note{text-align:center;color:var(--text-muted);font-size:.84rem;margin-top:1.2rem}
/* Bandeau valeur bas de page d'accueil */
.welcome-feature-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;max-width:980px;margin:1.6rem auto 0}
.welcome-feature{background:var(--card);border:1px solid #EEF5F6;border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.welcome-feature .wf-ico{font-size:1.5rem;margin-bottom:.5rem}
.welcome-feature h4{color:var(--primary);font-size:.95rem;margin-bottom:.3rem}
.welcome-feature p{font-size:.82rem;color:var(--text-muted);line-height:1.5}
@media(max-width:820px){.welcome-feature-grid{grid-template-columns:1fr}}

/* Cards & metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.metric{background:var(--card);border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:4px solid var(--primary-light);border-left:1px solid #EEF5F6;border-right:1px solid #EEF5F6;border-bottom:1px solid #EEF5F6}
.metric .val{font-size:1.8rem;font-weight:800;color:var(--primary)}
.metric .label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.05em}

.card{background:var(--card);border-radius:var(--radius);padding:1.2rem;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:1rem;border:1px solid #EEF5F6}
.card h3{color:var(--primary);font-size:1rem;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--soft)}
.pro-badge{display:inline-flex;align-items:center;gap:.35rem;background:#FFF4E5;color:#9A4D00;border:1px solid #FFD8A3;border-radius:999px;padding:.2rem .55rem;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.pro-grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr);gap:1rem;align-items:start}
.pro-panel{background:linear-gradient(135deg,#FFFFFF 0%,#F5FCFD 100%);border:1px solid var(--border);border-radius:8px;padding:1rem}
.pro-response{background:#F8FBFC;border:1px solid var(--border);border-radius:8px;padding:1rem;line-height:1.55;font-size:.9rem;white-space:pre-wrap}
.pro-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:.7rem;margin:.8rem 0}
.pro-kpi{background:#fff;border:1px solid #EEF5F6;border-left:4px solid var(--primary-light);border-radius:8px;padding:.7rem}
.pro-kpi strong{display:block;color:var(--primary);font-size:1.15rem}
.pro-kpi span{font-size:.76rem;color:var(--text-muted)}

/* Table */
.table-wrap{overflow-x:auto;margin:.8rem 0;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--primary);color:#fff;padding:.5rem .6rem;text-align:left;position:sticky;top:0;z-index:1}
td{padding:.4rem .6rem;border-bottom:1px solid #eee}
tr:nth-child(even){background:#f9f9f9}
tr:hover{background:var(--soft)}
td input,td select{border:1px solid #ddd;border-radius:4px;padding:2px 4px;font-size:.8rem;width:100%}
td input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 2px rgba(0,166,178,.18)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.2rem;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn-secondary{background:var(--soft);color:var(--primary)}
.btn-secondary:hover{background:#D7F0F2}
.btn-danger{background:#FFEBEE;color:var(--danger)}
.btn-danger:hover{background:#FFCDD2}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:#E87500;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff;transform:translateY(-1px)}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:.3rem .8rem;font-size:.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-group{display:flex;gap:.5rem;flex-wrap:wrap}

/* Navigation buttons */
.nav-buttons{display:flex;justify-content:space-between;margin-top:2rem;padding-top:1rem;border-top:2px solid #eee}

/* Forms */
.form-group{margin-bottom:.8rem}
.form-group label{display:block;font-weight:600;font-size:.82rem;color:#555;margin-bottom:.2rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.4rem .6rem;border:1px solid #ddd;border-radius:6px;font-size:.85rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 2px rgba(0,166,178,.18)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

/* Issues */
.issue{padding:.5rem .8rem;border-radius:0 8px 8px 0;margin:.3rem 0;font-size:.83rem;display:flex;align-items:center;gap:.5rem}
.issue.critical{background:#FFEBEE;border-left:4px solid var(--danger)}
.issue.warning{background:var(--soft-accent);border-left:4px solid var(--accent)}
.issue.info{background:var(--soft);border-left:4px solid var(--primary-light)}
.issue-actions{display:flex;gap:.4rem;flex-wrap:wrap;margin-left:auto;flex-shrink:0}
@media(max-width:560px){.issue{flex-direction:column;align-items:flex-start}.issue-actions{margin-left:0}}
.clickable-row{cursor:pointer;border-radius:8px;padding:.25rem .4rem;transition:background .15s}
.clickable-row:hover{background:var(--soft)}
.flash-highlight{animation:flashHi 1.6s ease}
@keyframes flashHi{0%,100%{box-shadow:0 0 0 0 rgba(255,138,0,0)}30%{box-shadow:0 0 0 3px rgba(255,138,0,.55)}}
/* Modal lignes concernées */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,20,40,.55);z-index:9000;align-items:center;justify-content:center;padding:1.2rem}
.modal-box{background:var(--card);border-radius:var(--radius);max-width:1000px;width:100%;max-height:88vh;overflow-y:auto;padding:1.3rem 1.4rem;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.3rem}
.modal-head strong{color:var(--primary);font-size:1.05rem}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#888;line-height:1}
.modal-close:hover{color:var(--danger)}
.modal-sub{font-size:.9rem;color:#333;margin:.2rem 0 .4rem}
.modal-hint{font-size:.78rem;color:#888;margin-bottom:.8rem;line-height:1.5}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
.focus-cell{background:#FFF4E5}
.focus-cell input{border-color:var(--accent)!important}

/* Reco */
.reco{padding:.6rem 1rem;border-radius:0 8px 8px 0;margin:.4rem 0;font-size:.85rem}
.reco.urgent{background:#FFEBEE;border-left:4px solid var(--danger)}
.reco.important{background:var(--soft-accent);border-left:4px solid var(--accent)}
.reco.improve{background:var(--soft);border-left:4px solid var(--primary-light)}
.reco strong{display:block;margin-bottom:.2rem}

/* Progress */
.progress-bar{background:#E0E0E0;border-radius:10px;height:12px;overflow:hidden;margin:.5rem 0}
.progress-bar .fill{height:100%;border-radius:10px;transition:width .5s ease}

/* Score display */
.score-display{text-align:center;padding:1.5rem}
.score-big{font-size:3.5rem;font-weight:800;color:var(--primary)}
.score-max{font-size:1.2rem;color:#888}
.score-level{display:inline-block;padding:.3rem 1.2rem;border-radius:20px;font-weight:700;margin-top:.5rem}

/* FAIR letters */
.fair-row{display:flex;justify-content:center;gap:1rem;margin:1.5rem 0}
.fair-item{text-align:center}
.fair-letter{width:60px;height:60px;line-height:60px;border-radius:50%;color:#fff;font-size:1.5rem;font-weight:800;display:inline-block}
.fair-label{font-size:.7rem;color:#888;margin-top:.3rem;display:block}

/* Score bars */
.score-bar-row{display:flex;align-items:center;gap:.5rem;margin:.4rem 0;font-size:.82rem}
.score-bar-label{width:170px;font-weight:600;flex-shrink:0}
.score-bar-track{flex:1;background:#E0E0E0;border-radius:8px;height:16px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:8px;transition:width .5s}
.score-bar-val{width:50px;text-align:right;font-weight:700}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:2px solid #E0E0E0}
.tab{padding:.5rem 1.2rem;cursor:pointer;font-size:.85rem;font-weight:600;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Upload zone */
.upload-zone{border:2px dashed #BDECEF;border-radius:12px;padding:3rem;text-align:center;cursor:pointer;transition:all .3s;background:linear-gradient(180deg,#fbfeff,#f3fbfc)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary-light);background:var(--soft)}
.upload-zone .icon{font-size:3rem;margin-bottom:.5rem;display:block}
.upload-zone input{display:none}

/* Mobile topbar (hidden on desktop) */
.topbar{display:none}

/* Anti-débordement horizontal (graphiques, images, contenus larges) */
svg,img{max-width:100%;height:auto}
.main{max-width:100vw}

/* Responsive : tablette et mobile passent en menu tiroir (hamburger) */
@media(max-width:820px){
body{flex-direction:column}
.topbar{display:flex;position:fixed;top:0;left:0;right:0;z-index:200;align-items:center;justify-content:space-between;background:linear-gradient(90deg,#00345F,#007C89);color:#fff;padding:.6rem .9rem;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar-brand-logo{height:38px;background:#fff;border-radius:7px;padding:.18rem .35rem}
.topbar h1{font-size:1.05rem;margin:0}
.topbar .burger{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.4rem;padding:.3rem .7rem;border-radius:8px;cursor:pointer;min-width:44px;min-height:44px}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:82%;max-width:320px;transform:translateX(-105%);transition:transform .25s ease;z-index:300;box-shadow:4px 0 20px rgba(0,0,0,.3)}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:250}
.sidebar-overlay.show{display:block}
.main{margin-left:0;padding:4.4rem 1rem 3rem}
.sidebar .nav-item{padding:.85rem .8rem;font-size:.95rem}
.btn{min-height:44px}
input,select,textarea{min-height:44px;font-size:16px}
textarea{min-height:64px}
.form-row{grid-template-columns:1fr}
.page-header{padding:1.2rem 1rem}
.page-header h2{font-size:1.25rem}
.welcome-hero{grid-template-columns:1fr;text-align:left;gap:1rem}
.mode-grid{grid-template-columns:1fr}
.pro-grid{grid-template-columns:1fr}
}
@media(max-width:560px){
.main{padding:4.4rem .8rem 2.5rem}
.metrics{grid-template-columns:repeat(2,1fr);gap:.7rem}
.metric .val{font-size:1.5rem}
.page-header h2{font-size:1.15rem}
.card{padding:1rem}
.nav-buttons{flex-direction:column-reverse;gap:.6rem}
.nav-buttons>div{width:100%}
.nav-buttons .btn{width:100%;justify-content:center}
.tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
.tab{white-space:nowrap}
}

/* Transition fluide entre étapes */
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#main-content>*{animation:fadeInUp .28s ease}
.card{transition:box-shadow .2s,transform .2s}

/* Notifications (toasts) non bloquantes */
#toasts{position:fixed;top:1rem;right:1rem;z-index:1000;display:flex;flex-direction:column;gap:.5rem;max-width:min(360px,90vw)}
.toast{display:flex;align-items:flex-start;gap:.6rem;background:#fff;border-left:4px solid var(--primary);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.16);padding:.7rem .9rem;font-size:.86rem;color:#333;animation:toastIn .25s ease;cursor:pointer}
.toast.success{border-left-color:#2E7D32}.toast.error{border-left-color:#C62828}.toast.info{border-left-color:#1565C0}
.toast .ico{font-size:1.1rem;line-height:1.2}
.toast.hide{animation:toastOut .25s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}
@media(max-width:600px){#toasts{left:1rem;right:1rem;max-width:none}}

/* Overlay de chargement */
#loading-overlay{position:fixed;inset:0;z-index:1100;background:rgba(255,255,255,.78);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center}
#loading-overlay.show{display:flex}
.spinner{width:46px;height:46px;border:4px solid #E0F0E1;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
.loading-box{text-align:center;color:var(--primary);font-weight:600}
.loading-box .msg{margin-top:.8rem;font-size:.9rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="toasts"></div>
<div id="loading-overlay"><div class="loading-box"><div class="spinner"></div><div class="msg" id="loading-msg">Chargement…</div></div></div>

<header class="topbar">
    <img class="topbar-brand-logo" src="assets/logo_afridata_ready_white.png" alt="AfriData Ready">
    <button class="burger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
</header>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<nav class="sidebar" id="sidebar">
    <img class="brand-logo" src="assets/logo_afridata_ready_white.png" alt="AfriData Ready">
    <p class="slogan">From Raw Data to FAIR & AI-Ready Data</p>
    <div id="lang-switch" class="lang-switch"></div>
    <div id="nav-items"></div>
    <div id="aux-nav" style="margin-top:1rem;padding-top:.8rem;border-top:1px solid rgba(255,255,255,.2)"></div>
    <div class="file-info" id="file-info" style="display:none">
        <p><strong>Fichier :</strong> <span id="info-filename"></span></p>
        <p><strong>Lignes :</strong> <span id="info-rows"></span></p>
        <p><strong>Colonnes :</strong> <span id="info-cols"></span></p>
        <p><strong>Modifications :</strong> <span id="info-edits">0</span></p>
    </div>
    <div class="founder-credit">
        <span id="founder-label">Fondateur</span><br>
        <strong>Patrick ALLA</strong>
    </div>
</nav>

<div class="main" id="main-content"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// UX : notifications non bloquantes + indicateur de chargement
// ═══════════════════════════════════════════════════════════════
function toast(message, type = 'info', ms = 3200) {
    const c = document.getElementById('toasts');
    if (!c) { return; }
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    const ico = type === 'success' ? '✅' : type === 'error' ? '⚠️' : 'ℹ️';
    el.innerHTML = `<span class="ico">${ico}</span><span>${message}</span>`;
    const dismiss = () => { el.classList.add('hide'); setTimeout(() => el.remove(), 250); };
    el.onclick = dismiss;
    c.appendChild(el);
    setTimeout(dismiss, ms);
}

// ── PWA : service worker (hors-ligne) + mise a jour auto + invite d'installation ──
let deferredInstallPrompt = null;
let _reloadingForUpdate = false;
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Verifie une mise a jour a chaque chargement
            reg.update().catch(() => {});
            reg.addEventListener('updatefound', () => {
                const nw = reg.installing;
                if (!nw) return;
                nw.addEventListener('statechange', () => {
                    // Nouvelle version prete alors qu'une version tourne deja
                    if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                        toast('🔄 Nouvelle version disponible. <u style="cursor:pointer">Actualiser</u>', 'info', 8000);
                        const t = document.querySelector('#toasts .toast:last-child');
                        if (t) t.onclick = () => { nw.postMessage && nw.postMessage('skipWaiting'); reg.waiting && reg.waiting.postMessage('skipWaiting'); location.reload(); };
                    }
                });
            });
        }).catch(() => {});
        // Recharge une fois quand le nouveau SW prend le controle
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (_reloadingForUpdate) return;
            _reloadingForUpdate = true;
            // pas de reload automatique agressif : l'utilisateur reste maitre via le toast
        });
    });
}
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    if (typeof renderNav === 'function') renderNav();
    if (!sessionStorage.getItem('installHintShown')) {
        sessionStorage.setItem('installHintShown', '1');
        setTimeout(() => { if (deferredInstallPrompt) toast('💡 Installez AfriData Ready pour l\'utiliser hors-ligne (menu : « Installer l\'application »).', 'info', 5000); }, 1500);
    }
});
window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    toast('AfriData Ready est installée. 🎉', 'success');
    if (typeof renderNav === 'function') renderNav();
});
async function promptInstall() {
    if (!deferredInstallPrompt) { toast('L\'application est déjà installée ou l\'installation n\'est pas disponible sur ce navigateur.', 'info', 4000); return; }
    deferredInstallPrompt.prompt();
    try { await deferredInstallPrompt.userChoice; } catch (e) {}
    deferredInstallPrompt = null;
    renderNav();
}

function renderNav() {

        const n = i + 1;
        let cls = 'nav-item';
        if (n === APP.step) cls += ' active';
        else if (APP.data && n < APP.step) cls += ' done';
        const disabled = !APP.data && n > 1;
        return `<div class="${cls}" onclick="${disabled ? '' : `goStep(${n})`}" style="${disabled ? 'opacity:.4;cursor:default' : ''}">
            <span class="num">${n === APP.step ? '▶' : (APP.data && n < APP.step ? '✓' : n)}</span>
            <span>${name}</span>
        </div>`;
    }).join('');

    // Sélecteur de langue
    const langEl = document.getElementById('lang-switch');
    if (langEl) langEl.innerHTML =
        `<button class="lang-btn ${APP.lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')">FR</button>
         <button class="lang-btn ${APP.lang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>`;

    const founderLabel = document.getElementById('founder-label');
    if (founderLabel) founderLabel.textContent = L().founder;

    const aux = document.getElementById('aux-nav');
    if (aux) {
        const auxItems = [
            ['welcome', '🏠', L().aux.home, false],
            ['projects', '📂', L().aux.projects, false],
            ['pro', '✨', L().aux.pro, false],
            ['referentiel', '📖', L().aux.reference, false],
            ['about', 'ℹ️', L().aux.about, false]
        ];
        let h = auxItems.map(([id, icon, label, dis]) => {
            let cls = 'nav-item'; if (id === APP.step) cls += ' active';
            return `<div class="${cls}" onclick="${dis ? '' : `goStep('${id}')`}" style="${dis ? 'opacity:.4;cursor:default' : ''}">

        // Panneau projet / sauvegarde

// FILE LOADING
// ═══════════════════════════════════════════════════════════════
function handleFile(file) {
    APP.fileName = file.name;
    const ext = file.name.toLowerCase().split('.').pop();
    APP.inputFormat = (ext === 'xlsx' || ext === 'xls') ? 'xlsx' : ext;
    APP.workbook = null;
    APP.sheetNames = [];
    APP.activeSheet = '';
    const reader = new FileReader();
    if (['csv', 'xlsx', 'xls', 'json'].includes(ext)) showLoading('Lecture de « ' + file.name + ' »…');

    if (ext === 'csv') {
        reader.onload = e => {
            try {
                const result = Papa.parse(e.target.result, { header: true, skipEmptyLines: true, dynamicTyping: true });
                APP.columns = result.meta.fields || [];
                APP.data = result.data;
                APP.originalData = JSON.parse(JSON.stringify(result.data));
                onDataLoaded();
                toast(`« ${file.name} » importé : ${APP.data.length} lignes, ${APP.columns.length} colonnes.`, 'success');
            } catch (err) { toast('Erreur de lecture CSV : ' + err.message, 'error'); }
            finally { hideLoading(); }
        };
        reader.onerror = () => { hideLoading(); toast('Impossible de lire le fichier.', 'error'); };
        reader.readAsText(file);
    } else if (ext === 'xlsx' || ext === 'xls') {
        reader.onload = e => {
            try {
                const wb = XLSX.read(e.target.result, { type: 'array' });
                APP.workbook = wb;
                APP.sheetNames = wb.SheetNames;
                loadSheet(wb.SheetNames[0]);
                toast(`« ${file.name} » importé : ${APP.data.length} lignes, ${APP.columns.length} colonnes.`, 'success');
            } catch (err) { toast('Erreur de lecture Excel : ' + err.message, 'error'); }
            finally { hideLoading(); }
        };
        reader.onerror = () => { hideLoading(); toast('Impossible de lire le fichier.', 'error'); };
        reader.readAsArrayBuffer(file);
    } else if (ext === 'json') {
        reader.onload = e => {
            try {
                const json = JSON.parse(e.target.result);
                const arr = Array.isArray(json) ? json : [json];
                APP.columns = Object.keys(arr[0] || {});
                APP.data = arr;
                APP.originalData = JSON.parse(JSON.stringify(arr));
                onDataLoaded();
                toast(`« ${file.name} » importé : ${APP.data.length} lignes, ${APP.columns.length} colonnes.`, 'success');
            } catch (err) { toast('Erreur JSON : ' + err.message, 'error'); }
            finally { hideLoading(); }
        };
        reader.onerror = () => { hideLoading(); toast('Impossible de lire le fichier.', 'error'); };
        reader.readAsText(file);
    } else {
        hideLoading();
        toast('Format non supporté. Utilisez CSV, Excel ou JSON.', 'error');
    }
}

function loadSheet(sheetName) {
    const ws = APP.workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(ws, { defval: null });
    APP.activeSheet = sheetName;
    if (json.length > 0) {
        APP.columns = Object.keys(json[0]);
        APP.data = json;
        APP.originalData = JSON.parse(JSON.stringify(json));
    } else {
        APP.columns = [];
        APP.data = [];
        APP.originalData = [];
    }
    onDataLoaded();
}

function onDataLoaded() {
    APP.variableDocs = {};
    APP.metadata = {};
    APP.editHistory = [];
    APP.undoStack = [];
    APP.editCount = 0;
    APP.dataVersionLabel = 'Original';
    APP.qualityReport = null;
    APP.fairScore = null;
    APP.aiScore = null;
    let initMissing = 0;
    for (const col of APP.columns) initMissing += countMissing(col);
    APP.initialStats = {
        rows: APP.data.length,
        cols: APP.columns.length,
        columns: [...APP.columns],
        missing: initMissing,
        duplicates: countDuplicates()
    };
    // Baseline scores captured at import (before any edit/documentation)
    const bFair = computeFAIR().total, bAi = computeAI().total, bAqi = computeAQI().total;
    APP.baseline = { docs: 0, fair: bFair, ai: bAi, aqi: bAqi };
    APP.aqiScore = null;
    APP.aqiHistory = [{ label: 'Initial', score: bAqi }];
    APP._assistCache = null;
    updateFileInfo();
    renderNav();
    renderStep();
    scheduleAutosave();
}

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function getVal(row, col) { return row[col]; }
function isNull(v) { return v === null || v === undefined || v === '' || (typeof v === 'number' && isNaN(v)); }
function countMissing(col) { return APP.data.filter(r => isNull(r[col])).length; }
function countDuplicates() {
    const seen = new Set();
    let dup = 0;
    for (const row of APP.data) {
        const key = APP.columns.map(c => String(row[c] ?? '')).join('|');
        if (seen.has(key)) dup++;
        else seen.add(key);
    }
    return dup;
}
function isNumericCol(col) {
    let numCount = 0, total = 0;
    for (const row of APP.data) {
        const v = row[col];
        if (isNull(v)) continue;
        total++;
        if (typeof v === 'number' || (typeof v === 'string' && !isNaN(parseFloat(v)) && isFinite(v))) numCount++;
    }
    return total > 0 && numCount / total > 0.7;
}
function numericValues(col) {
    return APP.data.map(r => r[col]).filter(v => !isNull(v) && !isNaN(parseFloat(v))).map(v => parseFloat(v));
}
function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}
function jsString(value) {
    return JSON.stringify(String(value ?? ''));
}
function normalizeCategoryValue(value) {
    return String(value ?? '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[’']/g, '')
        .replace(/[^a-z0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}
function levenshtein(a, b) {
    a = String(a); b = String(b);
    const dp = Array.from({ length: a.length + 1 }, (_, i) => [i]);
    for (let j = 1; j <= b.length; j++) dp[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
            dp[i][j] = Math.min(
                dp[i - 1][j] + 1,
                dp[i][j - 1] + 1,
                dp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
            );
        }
    }
    return dp[a.length][b.length];
}
function chooseCanonicalValue(items) {
    const enriched = items.map(item => {
        const norm = normalizeCategoryValue(item.value);
        const avgDistance = items.length > 1
            ? items.reduce((s, other) => s + levenshtein(norm, normalizeCategoryValue(other.value)), 0) / (items.length - 1)
            : 0;
        return { ...item, norm, avgDistance };
    });
    return enriched.sort((a, b) =>
        b.count - a.count ||
        (a.firstIndex ?? 0) - (b.firstIndex ?? 0) ||
        a.avgDistance - b.avgDistance ||
        a.norm.length - b.norm.length ||
        String(a.value).localeCompare(String(b.value), 'fr')
    )[0]?.value || '';
}
function notify(message, type = 'success') {
    APP.notice = { message, type };
}
function renderNotice() {
    if (!APP.notice) return '';
    const styles = {
        success: 'background:#E8F5E9;border-left:5px solid var(--primary);color:#1B5E20',
        info: 'background:#E3F2FD;border-left:5px solid #0277BD;color:#01579B',
        warning: 'background:#FFF8E1;border-left:5px solid var(--accent);color:#5D4037'
    };
    return `<div class="card" style="${styles[APP.notice.type] || styles.info};margin-bottom:1rem">
        <strong>${APP.notice.type === 'warning' ? 'Attention' : 'Action appliquée'} :</strong> ${escapeHtml(APP.notice.message)}
    </div>`;
}

function pct(a, b) { return b > 0 ? Math.round(a / b * 1000) / 10 : 0; }
function scoreColor(ratio) { return ratio < 0.4 ? 'var(--danger)' : ratio < 0.7 ? 'var(--accent)' : 'var(--primary)'; }

// ═══════════════════════════════════════════════════════════════
// STEP 2: QUALITY
// ═══════════════════════════════════════════════════════════════
function analyzeQuality() {
    const issues = [];
    const n = APP.data.length, nc = APP.columns.length, totalCells = n * nc;
    let totalMissing = 0;
    const missingPerCol = {};
    for (const col of APP.columns) {
        const m = countMissing(col);
        missingPerCol[col] = m;
        totalMissing += m;
    }
    const missingPct = pct(totalMissing, totalCells);

    if (totalMissing > 0)
        issues.push({ type: 'missing', severity: missingPct > 20 ? 'critical' : 'warning',
            message: `${totalMissing} valeurs manquantes (${missingPct}%)`, detail: missingPerCol });

    const nDup = countDuplicates();
    if (nDup > 0)
        issues.push({ type: 'duplicates', severity: 'warning', message: `${nDup} ligne(s) en doublon` });

    const emptyCols = APP.columns.filter(c => missingPerCol[c] === n);
    if (emptyCols.length > 0)
        issues.push({ type: 'empty_cols', severity: 'critical', message: `${emptyCols.length} colonne(s) entièrement vide(s) : ${emptyCols.join(', ')}` });

    const badNames = APP.columns.filter(c => c.length <= 2 || c.startsWith('Unnamed') || /^col\d+$/i.test(c));
    if (badNames.length > 0)
        issues.push({ type: 'bad_names', severity: 'warning', message: `${badNames.length} nom(s) de colonne(s) peu explicite(s) : ${badNames.join(', ')}` });

    for (const col of APP.columns) {
        const vals = APP.data.map(r => r[col]).filter(v => !isNull(v)).map(v => String(v).trim().toLowerCase());
        const unique = [...new Set(vals)];
        const binVals = new Set(['oui','non','yes','no','0','1','true','false','vrai','faux','o','n']);
        if (unique.length <= 6 && unique.length >= 2) {
            const inter = unique.filter(v => binVals.has(v));
            if (inter.length >= 2) {
                const ouiForms = inter.filter(v => ['oui','yes','1','true','o','vrai'].includes(v));
                const nonForms = inter.filter(v => ['non','no','0','false','n','faux'].includes(v));
                if (ouiForms.length > 1 || nonForms.length > 1)
                    issues.push({ type: 'inconsistent', severity: 'warning', col, message: `Colonne '${col}' : codage binaire incohérent (${unique.join(', ')})` });
            }
        }
    }

    for (const col of APP.columns) {
        if (/date|annee|année|mois|year|period/i.test(col)) {
            const vals = APP.data.map(r => r[col]).filter(v => !isNull(v)).map(v => String(v));
            const patterns = new Set();
            for (const v of vals.slice(0, 50)) {
                if (/\d{2}\/\d{2}\/\d{4}/.test(v)) patterns.add('DD/MM/YYYY');
                if (/\d{4}-\d{2}-\d{2}/.test(v)) patterns.add('YYYY-MM-DD');
                if (/\d{2}-\d{2}-\d{4}/.test(v)) patterns.add('DD-MM-YYYY');
            }
            if (patterns.size > 1)
                issues.push({ type: 'date', severity: 'warning', col, message: `Colonne '${col}' : formats de date mixtes (${[...patterns].join(', ')})` });
        }
    }

    // Similar categorical values + descriptive stats + outliers
    const similarValueDetails = {};
    const outlierDetails = {};
    const descStats = {};
    for (const col of APP.columns) {
        const vals = numericValues(col);
        if (isNumericCol(col) && vals.length >= 4) {
            vals.sort((a, b) => a - b);
            const len = vals.length;
            const mean = vals.reduce((s, v) => s + v, 0) / len;
            const q1 = vals[Math.floor(len * 0.25)];
            const median = len % 2 === 0 ? (vals[len/2-1]+vals[len/2])/2 : vals[Math.floor(len/2)];
            const q3 = vals[Math.floor(len * 0.75)];
            const iqr = q3 - q1;
            const std = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / len);
            descStats[col] = { type: 'numeric', count: len, mean: +mean.toFixed(3), median: +median.toFixed(3), std: +std.toFixed(3), min: vals[0], max: vals[len-1], q1, q3 };
            if (iqr > 0) {
                const lo = q1 - 1.5 * iqr, hi = q3 + 1.5 * iqr;
                const outlierVals = APP.data.map((r, i) => ({ i, v: parseFloat(r[col]) }))
                    .filter(x => !isNaN(x.v) && (x.v < lo || x.v > hi));
                if (outlierVals.length > 0) {
                    outlierDetails[col] = { count: outlierVals.length, lo: +lo.toFixed(3), hi: +hi.toFixed(3), q1, q3, iqr: +iqr.toFixed(3), examples: outlierVals.slice(0, 5).map(x => x.v) };
                    issues.push({ type: 'outliers', severity: 'warning', col, lo, hi, message: `Colonne '${col}' : ${outlierVals.length} valeur(s) aberrante(s) (hors [${lo.toFixed(1)}, ${hi.toFixed(1)}])` });
                }
            }
        } else if (!isNumericCol(col)) {
            const allVals = APP.data.map(r => r[col]).filter(v => !isNull(v)).map(v => String(v));
            const freq = {};
            const firstIndex = {};
            allVals.forEach((v, i) => { freq[v] = (freq[v] || 0) + 1; if (firstIndex[v] === undefined) firstIndex[v] = i; });
            const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1] || firstIndex[a[0]] - firstIndex[b[0]]);
            descStats[col] = { type: 'categorical', count: allVals.length, unique: sorted.length, topValues: sorted.slice(0, 5) };
            const candidates = sorted.map(([value, count]) => ({ value, count, firstIndex: firstIndex[value], norm: normalizeCategoryValue(value) }))
                .filter(x => x.norm && x.norm.length >= 2);
            if (candidates.length >= 2 && candidates.length <= 80) {
                const groups = [];
                const seen = new Set();
                const itemByValue = Object.fromEntries(candidates.map(x => [x.value, x]));
                const byNorm = {};
                for (const item of candidates) (byNorm[item.norm] ||= []).push(item);
                for (const same of Object.values(byNorm)) {
                    if (same.length < 2) continue;
                    const values = same.map(x => x.value);
                    values.forEach(v => seen.add(v));
                    groups.push({ type: 'format', values, target: chooseCanonicalValue(same), count: same.reduce((s, x) => s + x.count, 0) });
                }

                const parent = new Map(candidates.map(x => [x.value, x.value]));
                const find = x => parent.get(x) === x ? x : (parent.set(x, find(parent.get(x))), parent.get(x));
                const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent.set(rb, ra); };
                for (let i = 0; i < candidates.length; i++) {
                    for (let j = i + 1; j < candidates.length; j++) {
                        const a = candidates[i], b = candidates[j];
                        if (a.norm === b.norm) continue;
                        const maxLen = Math.max(a.norm.length, b.norm.length);
                        if (maxLen < 4) continue;
                        const d = levenshtein(a.norm, b.norm);
                        const similar = d <= (maxLen <= 5 ? 1 : 2) || d / maxLen <= 0.22;
                        if (similar) union(a.value, b.value);
                    }
                }
                const fuzzy = {};
                for (const item of candidates) (fuzzy[find(item.value)] ||= []).push(item);
                for (const groupItems of Object.values(fuzzy)) {
                    const values = groupItems.map(x => x.value);
                    if (values.length < 2 || values.every(v => seen.has(v))) continue;
                    const existing = groups.find(g => g.values.some(v => values.includes(v)));
                    if (existing) {
                        existing.values = [...new Set([...existing.values, ...values])];
                        const mergedItems = existing.values.map(v => itemByValue[v]).filter(Boolean);
                        existing.type = 'similar';
                        existing.target = chooseCanonicalValue(mergedItems);
                        existing.count = mergedItems.reduce((s, x) => s + x.count, 0);
                    } else {
                        groups.push({ type: 'similar', values, target: chooseCanonicalValue(groupItems), count: groupItems.reduce((s, x) => s + x.count, 0) });
                    }
                    values.forEach(v => seen.add(v));
                }
                if (groups.length) {
                    const keptGroups = groups.slice(0, 12);
                    similarValueDetails[col] = keptGroups;
                    const flatValues = [...new Set(keptGroups.flatMap(g => g.values))];
                    issues.push({ type: 'similar_values', severity: 'warning', col, flatValues, message: `Colonne '${col}' : ${keptGroups.length} groupe(s) de valeurs similaires à harmoniser` });
                }
            }
        }
    }

    return { n_rows: n, n_cols: nc, totalMissing, missingPct, n_duplicates: nDup, emptyCols, issues, missingPerCol, similarValueDetails, outlierDetails, descStats };
}

function showEditTab(id, el) {
    APP.activeEditTab = id;
    const scope = el.closest('.tab-scope') || document;
    scope.querySelectorAll('.edit-tab').forEach(t => t.style.display = 'none');
    document.getElementById(id).style.display = 'block';

}

// ── Traçabilité des problèmes : localiser les lignes + relier à la solution ──
function duplicateRowIndices() {
    const seen = new Map();
    const dups = [];
    APP.data.forEach((row, i) => {
        const key = APP.columns.map(c => String(row[c] ?? '')).join('|');
        if (seen.has(key)) dups.push(i);
        else seen.set(key, i);
    });
    return dups;
}
function missingRowIndices(col) {
    const out = [];
    APP.data.forEach((r, i) => { if (isNull(r[col])) out.push(i); });
    return out;
}
// Lignes concernées par un problème (null si non applicable au niveau ligne)
function issueRowInfo(issue) {
    const d = APP.data;
    switch (issue.type) {
        case 'duplicates': return { rows: duplicateRowIndices(), col: null, focusCols: APP.columns };
        case 'missing': {
            const rows = [];
            d.forEach((r, i) => { if (APP.columns.some(c => isNull(r[c]))) rows.push(i); });
            return { rows, col: null, focusCols: APP.columns.filter(c => countMissing(c) > 0) };
        }
        case 'outliers': {
            const c = issue.col, rows = [];
            d.forEach((r, i) => { const v = parseFloat(r[c]); if (!isNaN(v) && (v < issue.lo || v > issue.hi)) rows.push(i); });
            return { rows, col: c, focusCols: [c] };
        }
        case 'similar_values': {
            const c = issue.col, set = new Set((issue.flatValues || []).map(v => String(v))), rows = [];
            d.forEach((r, i) => { if (set.has(String(r[c] ?? ''))) rows.push(i); });
            return { rows, col: c, focusCols: [c] };
        }
        case 'inconsistent':
        case 'date': {
            const c = issue.col, rows = [];
            d.forEach((r, i) => { if (!isNull(r[c])) rows.push(i); });
            return { rows, col: c, focusCols: [c] };
        }
        default: return null;
    }
}
function solutionTabFor(type) {
    return { missing: 'edit-missing', duplicates: 'edit-dup', outliers: 'q-outliers',
        similar_values: 'q-similar', inconsistent: 'edit-cells', date: 'edit-cells',
        empty_cols: 'edit-cols', bad_names: 'edit-cols' }[type] || null;
}
function goToSolution(tabId) {
    const btn = document.querySelector(`[data-edit-tab="${tabId}"]`);
    if (!btn) return;
    showEditTab(tabId, btn);
    const scope = btn.closest('.tab-scope') || btn;
    scope.scrollIntoView({ behavior: 'smooth', block: 'center' });
    scope.classList.add('flash-highlight');
    setTimeout(() => scope.classList.remove('flash-highlight'), 1600);
}
function showIssueRows(idx) {
    const issue = (APP.qualityReport && APP.qualityReport.issues || [])[idx];
    if (!issue) return;
    const info = issueRowInfo(issue);
    if (!info || !info.rows.length) { toast('Aucune ligne précise à localiser pour ce problème.', 'info'); return; }
    openRowsModal(issue, info);
}
function showColMissingRows(colIdx) {
    const col = APP.columns[colIdx];
    if (col === undefined) return;
    const rows = missingRowIndices(col);
    if (!rows.length) return;
    openRowsModal({ type: 'missing', col, message: `Colonne « ${col} » : ${rows.length} valeur(s) manquante(s)` },
        { rows, col, focusCols: [col] });
}
function openRowsModal(issue, info) {
    const cap = 300;
    const rows = info.rows, shown = rows.slice(0, cap);
    const focus = new Set(info.focusCols || []);
    const cols = info.col ? [info.col, ...APP.columns.filter(c => c !== info.col)] : APP.columns.slice();
    let t = `<div class="table-wrap" style="max-height:56vh"><table><tr><th style="width:70px">Ligne</th>${cols.map(c => `<th>${escapeHtml(c)}${focus.has(c) ? ' 🔎' : ''}</th>`).join('')}</tr>`;
    for (const i of shown) {
        t += `<tr><td style="font-weight:700;color:var(--primary)">${i + 1}</td>` + cols.map(c => {
            const v = APP.data[i][c] ?? '';
            const hl = focus.has(c) ? ' class="focus-cell"' : '';
            return `<td${hl}><input value="${escapeHtml(v)}" onchange="editCell(${i},${jsString(c)},this.value)"></td>`;
        }).join('') + `</tr>`;
    }
    t += '</table></div>';
    const more = rows.length > cap ? `<p style="font-size:.8rem;color:#888;margin-top:.4rem">Affichage des ${cap} premières lignes sur ${rows.length}. Modifiez ici ou utilisez la solution ci-dessous.</p>` : '';
    const solTab = solutionTabFor(issue.type);
    const box = `<div class="modal-box">
        <div class="modal-head"><strong>📍 ${rows.length} ligne(s) concernée(s)</strong><button class="modal-close" onclick="closeRowsModal()" aria-label="Fermer">✕</button></div>
        <p class="modal-sub">${escapeHtml(issue.message)}</p>
        <p class="modal-hint">La colonne 🔎 signale la cellule à vérifier. « Ligne » correspond au numéro de ligne des données (hors en-tête). Vous pouvez corriger directement une valeur ci-dessous.</p>
        ${t}${more}
        <div class="modal-actions">
            ${solTab ? `<button class="btn btn-accent btn-sm" onclick="closeRowsModal();goToSolution('${solTab}')">🔧 Aller à la solution</button>` : ''}
            <button class="btn btn-secondary btn-sm" onclick="closeRowsModal()">Fermer</button>
        </div></div>`;
    let bd = document.getElementById('rows-modal');
    if (!bd) {
        bd = document.createElement('div');
        bd.id = 'rows-modal';
        bd.className = 'modal-backdrop';
        bd.onclick = e => { if (e.target === bd) closeRowsModal(); };
        document.body.appendChild(bd);
    }
    bd.innerHTML = box;
    bd.style.display = 'flex';
}
function closeRowsModal() {

function deleteColumns() {

function standardizeNames() {
    pushUndoSnapshot('Standardiser les noms de colonnes');
    const mapping = {};
    APP.columns.forEach((c, i) => {
        let nw = String(c).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        if (!nw) nw = `colonne_${i + 1}`;
        let candidate = nw;
        let suffix = 2;
        while (Object.values(mapping).includes(candidate)) {
            candidate = `${nw}_${suffix++}`;
        }
        mapping[c] = candidate;
    });
    const newCols = [];
    for (const old of APP.columns) {
        const nw = mapping[old];
        newCols.push(nw);
        if (nw !== old) APP.data.forEach(row => { row[nw] = row[old]; delete row[old]; });
    }
    APP.columns = newCols;
    addHistory('Standardiser noms', `${APP.columns.length} colonnes`);
    renderStep();
}

function fillMissing(colArg, methodArg, customArg) {
    const col = colArg ?? document.getElementById('fill-col')?.value;
    const method = methodArg ?? document.getElementById('fill-method')?.value;
    const custom = customArg ?? document.getElementById('fill-custom')?.value ?? '';
    APP.activeEditTab = 'edit-missing';
    if (!col || !method) {
        toast('Veuillez choisir une colonne et une méthode.');
        restoreEditTab();
        return;
    }
    const missingBefore = countMissing(col);
    const totalBefore = APP.columns.reduce((sum, c) => sum + countMissing(c), 0);
    if (missingBefore === 0) {
        toast(`Aucune valeur manquante dans "${col}".`);
        restoreEditTab();
        return;
    }
    if (method === 'custom' && custom.trim() === '') {
        toast('Veuillez saisir une valeur personnalisée non vide.');
        restoreEditTab();
        return;
    }

    pushUndoSnapshot(`Traiter les valeurs manquantes de ${col}`);
    if (method === 'drop') {
        const before = APP.data.length;
        APP.data = APP.data.filter(r => !isNull(r[col]));
        const removed = before - APP.data.length;
        addHistory('Supprimer lignes (manquants)', `${col}: ${removed} lignes`);
        const totalAfter = APP.columns.reduce((sum, c) => sum + countMissing(c), 0);
        notify(`${removed} ligne(s) supprimée(s) pour "${col}". Valeurs manquantes restantes : ${totalAfter} (${totalBefore} avant).`);
    } else {
        let fillVal;
        const vals = numericValues(col);
        if ((method === 'mean' || method === 'median') && vals.length === 0) {
            toast(`Cette méthode n'est pas applicable : "${col}" ne contient pas de valeurs numériques.`);
            restoreEditTab();
            return;
        }
        if (method === 'mean' && vals.length > 0) fillVal = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 100) / 100;
        else if (method === 'median' && vals.length > 0) {
            vals.sort((a, b) => a - b);
            const mid = Math.floor(vals.length / 2);
            fillVal = vals.length % 2 ? vals[mid] : Math.round(((vals[mid - 1] + vals[mid]) / 2) * 100) / 100;
        }
        else if (method === 'mode') {
            const freq = {};
            APP.data.forEach(r => { if (!isNull(r[col])) freq[r[col]] = (freq[r[col]] || 0) + 1; });
            fillVal = Object.entries(freq).sort((a, b) => b[1] - a[1])[0]?.[0];
            if (fillVal === undefined) {
                toast(`Le mode n'est pas applicable : "${col}" ne contient aucune valeur non manquante.`);
                restoreEditTab();
                return;
            }
        } else if (method === 'custom') fillVal = custom;

        if (fillVal !== undefined) {
            APP.data.forEach(r => { if (isNull(r[col])) r[col] = fillVal; });
            const changed = missingBefore - countMissing(col);
            const totalAfter = APP.columns.reduce((sum, c) => sum + countMissing(c), 0);
            addHistory(`Remplir manquants (${method})`, `${col} → ${fillVal}`);
            notify(`${changed} valeur(s) manquante(s) remplacée(s) dans "${col}". Valeurs manquantes restantes : ${totalAfter} (${totalBefore} avant).`);
        }
    }
    renderStep();
    restoreEditTab();
}

function removeDuplicates() {
    pushUndoSnapshot('Supprimer les doublons');
    const seen = new Set(); const newData = [];
    for (const row of APP.data) {
        const key = APP.columns.map(c => String(row[c] ?? '')).join('|');
        if (!seen.has(key)) { seen.add(key); newData.push(row); }
    }
    const removed = APP.data.length - newData.length;
    APP.data = newData;
    addHistory('Supprimer doublons', `${removed} lignes`);
    renderStep();
}

function applySimilarValues(col, values, target) {
    if (!col || !Array.isArray(values) || !values.length) {
        toast('Aucun groupe de valeurs à harmoniser.');
        return;
    }
    target = String(target ?? '').trim();
    if (!target) {
        toast('Veuillez saisir une valeur cible non vide.');
        return;
    }
    pushUndoSnapshot(`Harmoniser les valeurs similaires de ${col}`);
    const originals = new Set(values.map(v => String(v)));
    let changed = 0;
    APP.data = APP.data.map(row => {
        const current = row[col];
        if (isNull(current) || !originals.has(String(current)) || String(current) === target) return row;
        changed++;
        return { ...row, [col]: target };
    });
    if (changed === 0) {
        APP.undoStack.pop();
        toast(`Aucune valeur à modifier dans "${col}".`);
        return;
    }
    addHistory('Harmoniser valeurs similaires', `${col} : ${values.join(', ')} → ${target} (${changed} ligne(s))`, 'Correction des catégories incohérentes');
    APP.qualityReport = null;
    APP.fairScore = null;
    APP.aiScore = null;
    APP.aqiScore = null;
    APP._assistCache = null;
    notify(`"${col}" harmonisée : ${changed} valeur(s) remplacée(s) par "${target}".`);
    renderStep();
    setTimeout(reopenSimilarTab, 20);
}

// ── Correction des valeurs aberrantes en un clic (règle 1.5×IQR) ──
function outlierBounds(col) {
    const v = numericValues(col).sort((a, b) => a - b);
    if (v.length < 4) return null;
    const q1 = v[Math.floor(v.length * 0.25)], q3 = v[Math.floor(v.length * 0.75)];
    const iqr = q3 - q1;
    if (iqr <= 0) return null;
    const median = v.length % 2 ? v[(v.length - 1) / 2] : (v[v.length / 2 - 1] + v[v.length / 2]) / 2;
    return { lo: q1 - 1.5 * iqr, hi: q3 + 1.5 * iqr, median };
}

function reopenOutliersTab() {
    const t = [...document.querySelectorAll('.tab')].find(x => x.textContent.includes('aberrantes'));
    if (t) showEditTab('q-outliers', t);
}

function fixOutliers(col, method) {
    const countCurrentOutliers = () => {
        const b = outlierBounds(col);
        if (!b) return 0;
        return APP.data.filter(r => {
            const n = parseFloat(r[col]);
            return !isNaN(n) && (n < b.lo || n > b.hi);
        }).length;
    };
    const applyOnce = () => {
        const b = outlierBounds(col);
        if (!b) return 0;
        const isOut = x => {
            const n = parseFloat(x);
            return !isNaN(n) && (n < b.lo || n > b.hi);
        };
        const affectedNow = APP.data.filter(r => isOut(r[col])).length;
        if (affectedNow === 0) return 0;
        if (method === 'drop') {
            APP.data = APP.data.filter(r => !isOut(r[col]));
            return affectedNow;
        }
        APP.data = APP.data.map(r => {
            if (!isOut(r[col])) return r;
            const nr = { ...r }, n = parseFloat(r[col]);
            if (method === 'cap') nr[col] = Math.round((n < b.lo ? b.lo : b.hi) * 1000) / 1000;
            else if (method === 'median') nr[col] = Math.round(b.median * 1000) / 1000;
            else if (method === 'null') nr[col] = null;
            return nr;
        });
        return affectedNow;
    };

    if (!outlierBounds(col)) {
        toast(`Impossible de traiter les valeurs aberrantes de "${col}" : pas assez de valeurs num\u00e9riques.`);
        return;
    }
    const affectedBefore = countCurrentOutliers();
    if (affectedBefore === 0) {
        toast(`Aucune valeur aberrante \u00e0 traiter dans "${col}".`);
        return;
    }

    pushUndoSnapshot(`Corriger les valeurs aberrantes de ${col}`);
    let affected = 0;
    let passes = 0;
    const maxPasses = 20;
    do {
        const changed = applyOnce();
        affected += changed;
        passes += changed > 0 ? 1 : 0;
        if (changed === 0) break;
    } while (countCurrentOutliers() > 0 && passes < maxPasses);

    let actionLabel = '';
    if (method === 'drop') {
        actionLabel = 'lignes supprim\u00e9es';
        addHistory('Aberrantes : lignes supprim\u00e9es', `${col} : ${affected} ligne(s)`, 'R\u00e8gle 1.5\u00d7IQR');
    } else {
        const lbl = method === 'cap' ? 'plafonn\u00e9es (bornes IQR)' : method === 'median' ? 'remplac\u00e9es par la m\u00e9diane' : 'mises \u00e0 vide';
        actionLabel = lbl;
        addHistory(`Aberrantes : ${lbl}`, `${col} : ${affected} valeur(s)`, 'R\u00e8gle 1.5\u00d7IQR');
    }
    const afterReport = analyzeQuality();
    const remainingCols = Object.keys(afterReport.outlierDetails || {}).length;
    const remainingInCol = afterReport.outlierDetails?.[col]?.count || 0;
    APP.qualityReport = afterReport;
    APP.fairScore = null;
    APP.aiScore = null;
    APP.aqiScore = null;
    APP._assistCache = null;
    if (typeof pushAqiHistory === 'function') pushAqiHistory('Aberrantes');
    notify(`Correction appliqu\u00e9e \u00e0 "${col}" : ${affected} ${method === 'drop' ? 'ligne(s)' : 'valeur(s)'} ${actionLabel}. ${remainingInCol === 0 ? 'Cette colonne ne contient plus de valeur aberrante d\u00e9tect\u00e9e.' : `Il reste ${remainingInCol} valeur(s) aberrante(s) dans cette colonne.`} Colonnes aberrantes restantes : ${remainingCols}. La base corrig\u00e9e et les exports utiliseront ces donn\u00e9es.`);
    renderStep();
    setTimeout(reopenOutliersTab, 20);
}

// STEP 6: FAIR SCORE
// ═══════════════════════════════════════════════════════════════
function computeFAIR() {
    const m = APP.metadata, df = APP.data, cols = APP.columns;
    const d = {};
    for (const c of cols) { if (APP.variableDocs[c]) d[c] = APP.variableDocs[c]; }
    const scores = { F: 0, A: 0, I: 0, R: 0 };
    const details = { F: [], A: [], I: [], R: [] };
    const maxS = { F: 25, A: 25, I: 25, R: 25 };

    // fix = {field, step} : action concrète pour atteindre le critère
    const check = (letter, pts, cond, ok, fail, fix) => {
        if (cond) { scores[letter] += pts; details[letter].push(['ok', ok, null]); }
        else details[letter].push(['missing', fail, fix]);
    };

    check('F', 5, m.title, 'Titre renseigné', 'Titre manquant', { field: 'title', step: 4 });
    check('F', 5, m.description, 'Description renseignée', 'Description manquante', { field: 'description', step: 4 });
    check('F', 5, m.keywords, 'Mots-clés renseignés', 'Mots-clés manquants', { field: 'keywords', step: 4 });
    check('F', 5, m.author, 'Auteur renseigné', 'Auteur manquant', { field: 'author', step: 4 });
    check('F', 5, m.version, 'Version renseignée', 'Version manquante', { field: 'version', step: 4, auto: 'version' });

    check('A', 8, m.license, 'Licence définie', 'Licence manquante', { field: 'license', step: 4, auto: 'license' });
    check('A', 7, m.access_conditions, "Conditions d'accès définies", "Conditions d'accès manquantes", { field: 'access_conditions', step: 4, auto: 'access' });
    check('A', 5, m.contact, 'Contact renseigné', 'Contact manquant', { field: 'contact', step: 4 });
    check('A', 5, m.citation, 'Citation recommandée définie', 'Citation recommandée manquante', { field: 'citation', step: 4, auto: 'citation' });

    const goodNames = cols.filter(c => c.length > 3 && !c.startsWith('Unnamed')).length;
    const nameRatio = cols.length > 0 ? goodNames / cols.length : 0;
    scores.I += Math.round(nameRatio * 8);
    details.I.push([nameRatio > 0.8 ? 'ok' : 'missing', `Noms de colonnes explicites : ${goodNames}/${cols.length}`, nameRatio > 0.8 ? null : { step: 2 }]);

    const nNumeric = cols.filter(c => isNumericCol(c)).length;
    const typeRatio = cols.length > 0 ? nNumeric / cols.length : 0;
    scores.I += Math.round(typeRatio * 7);
    details.I.push([typeRatio > 0.5 ? 'ok' : 'missing', `Colonnes typées : ${nNumeric}/${cols.length}`, null]);
    scores.I += 5; details.I.push(['ok', 'Format standard (CSV/Excel)', null]);
    const docRatio = cols.length > 0 ? Object.keys(d).length / cols.length : 0;
    scores.I += Math.round(docRatio * 5);
    details.I.push([docRatio > 0.5 ? 'ok' : 'missing', `Variables documentées : ${Object.keys(d).length}/${cols.length}`, docRatio > 0.5 ? null : { step: 3, auto: 'doc' }]);

    check('R', 6, m.license, 'Licence définie pour réutilisation', 'Licence nécessaire pour la réutilisation', { field: 'license', step: 4, auto: 'license' });
    check('R', 5, m.collection_method, 'Méthode de collecte documentée', 'Méthode de collecte manquante', { field: 'collection_method', step: 4 });
    check('R', 4, m.geographic_area, 'Zone géographique renseignée', 'Zone géographique manquante', { field: 'geographic_area', step: 4 });

    const totalCells = df.length * cols.length;
    let totalMiss = 0; cols.forEach(c => totalMiss += countMissing(c));
    const missPct = totalCells > 0 ? totalMiss / totalCells * 100 : 100;
    if (missPct < 5) { scores.R += 5; details.R.push(['ok', `Complétude élevée (${(100 - missPct).toFixed(1)}%)`, null]); }
    else if (missPct < 20) { scores.R += 3; details.R.push(['partial', `Complétude moyenne (${(100 - missPct).toFixed(1)}%)`, { step: 2 }]); }
    else details.R.push(['missing', `Complétude faible (${(100 - missPct).toFixed(1)}%)`, { step: 2 }]);

    scores.R += Math.round(docRatio * 5);
    details.R.push([docRatio > 0.5 ? 'ok' : 'missing', `Dictionnaire de données : ${Object.keys(d).length}/${cols.length}`, docRatio > 0.5 ? null : { step: 3, auto: 'doc' }]);

    return { scores, details, total: scores.F + scores.A + scores.I + scores.R, max: 100, maxS };
}

// Renseigne automatiquement un champ FAIR déductible, puis recalcule
function fairAutoFix(kind) {
    const m = { ...APP.metadata };
    if (kind === 'license') m.license = m.license || 'CC-BY 4.0';
    else if (kind === 'version') m.version = m.version || '1.0';
    else if (kind === 'access') m.access_conditions = m.access_conditions || 'Accès ouvert';
    else if (kind === 'citation') {
        const author = m.author || 'Auteur', year = new Date().getFullYear(), title = m.title || APP.fileName;
        m.citation = m.citation || `${author} (${year}). ${title}. Version ${m.version || '1.0'}.`;
    }
    APP.metadata = m;
    addHistory('FAIR : champ renseigné automatiquement', kind, 'Valeur par défaut proposée, modifiable à l\'étape 4');
    if (typeof pushAqiHistory === 'function') pushAqiHistory('FAIR');
    APP._assistCache = null;
    renderNav(); renderStep();
}

}

// ═══════════════════════════════════════════════════════════════
// STEP 7: AI READINESS
// ═══════════════════════════════════════════════════════════════
function computeAI() {
    const df = APP.data, cols = APP.columns, m = APP.metadata;
    const d = {};
    for (const c of cols) { if (APP.variableDocs[c]) d[c] = APP.variableDocs[c]; }
    const dims = {}, details = {};
    const maxD = { 'Complétude': 20, 'Cohérence': 15, 'Documentation': 15, 'Qualité des variables': 15, 'Variable cible': 10, 'Structure': 15, 'Données sensibles': 10 };

    const totalCells = df.length * cols.length;
    let totalMiss = 0; cols.forEach(c => totalMiss += countMissing(c));
    const missPct = totalCells > 0 ? totalMiss / totalCells * 100 : 100;
    dims['Complétude'] = missPct === 0 ? 20 : missPct <= 2 ? 18 : missPct <= 5 ? 15 : missPct <= 10 ? 12 : missPct <= 20 ? 8 : missPct <= 35 ? 4 : 0;
    details['Complétude'] = [`Taux de valeurs manquantes : ${missPct.toFixed(1)}%`];

    const nDup = countDuplicates();
    const dupPct = df.length > 0 ? nDup / df.length * 100 : 0;
    let s2 = 15;
    if (dupPct > 20) s2 -= 8; else if (dupPct > 5) s2 -= 4; else if (dupPct > 0) s2 -= 2;
    dims['Cohérence'] = Math.max(0, s2);
    details['Cohérence'] = [`Doublons : ${nDup} (${dupPct.toFixed(1)}%)`];

    const docRatio = cols.length > 0 ? Object.keys(d).length / cols.length : 0;
    let s3 = Math.round(docRatio * 10);
    if (m.description) s3 += 3;
    if (m.collection_method) s3 += 2;
    dims['Documentation'] = Math.min(15, s3);
    details['Documentation'] = [`Variables documentées : ${Object.keys(d).length}/${cols.length}`];

    const goodNames = cols.filter(c => c.length > 3 && !c.startsWith('Unnamed')).length;
    const nameRatio = cols.length > 0 ? goodNames / cols.length : 0;
    const nNumeric = cols.filter(c => isNumericCol(c)).length;
    const featRatio = cols.length > 0 ? nNumeric / cols.length : 0;
    dims['Qualité des variables'] = Math.min(15, Math.round(nameRatio * 8) + Math.round(featRatio * 7));
    details['Qualité des variables'] = [`Noms explicites : ${goodNames}/${cols.length}`, `Features numériques : ${nNumeric}/${cols.length}`];

    const targetKw = ['target','cible','label','classe','class','output','yield','rendement','production'];
    let hasTarget = cols.some(c => targetKw.some(k => c.toLowerCase().includes(k)));
    if (!hasTarget) hasTarget = Object.values(d).some(v => v.is_target);
    dims['Variable cible'] = hasTarget ? 10 : 0;
    details['Variable cible'] = [`Variable cible identifiée : ${hasTarget ? 'Oui' : 'Non'}`];

    let s6 = 15;
    const emptyCols = cols.filter(c => countMissing(c) === df.length).length;
    const emptyRows = df.filter(r => cols.every(c => isNull(r[c]))).length;
    if (emptyCols > 0) s6 -= 5;
    if (emptyRows > 0) s6 -= 3;
    if (df.length < 30) s6 -= 4; else if (df.length < 100) s6 -= 2;
    dims['Structure'] = Math.max(0, s6);
    details['Structure'] = [`Colonnes vides : ${emptyCols}, Lignes vides : ${emptyRows}`, `Observations : ${df.length}`];

    const sensitiveKw = ['nom','name','prenom','surname','telephone','phone','email','adresse','address','ssn','cin'];
    const sensitiveCols = cols.filter(c => sensitiveKw.some(k => c.toLowerCase().includes(k)))
        .filter(c => !(APP.anonymizedCols || []).includes(c));
    let s7 = Math.max(0, 10 - sensitiveCols.length * 3);
    dims['Données sensibles'] = s7;
    details['Données sensibles'] = [`Colonnes sensibles non traitées : ${sensitiveCols.length > 0 ? sensitiveCols.join(', ') : 'Aucune'}`];

    const total = Object.values(dims).reduce((a, b) => a + b, 0);
    const level = total <= 39 ? ['Faible', 'var(--danger)'] : total <= 69 ? ['Moyen', 'var(--accent)'] : ['Élevé', 'var(--primary)'];

    return { dims, details, total, max: 100, maxD, level };
}

function renderStep7() {
    if (!APP.data) return '<div class="card"><p>Veuillez d\'abord importer un fichier.</p></div>';
    const ai = computeAI();
    APP.aiScore = ai;

    let html = `${stepHeaderHTML(6)}`;

    html += `<div class="card"><div class="score-display">
        <div class="score-big" style="color:${ai.level[1]}">${ai.total}</div>
        <div class="score-max">/100</div>
        <div class="score-level" style="background:${ai.level[1]};color:#fff">${ai.level[0]}</div>
    </div></div>`;

    html += '<div class="card"><h3>Scores par dimension</h3>';
    for (const [dim, score] of Object.entries(ai.dims)) {
        const mx = ai.maxD[dim], ratio = mx > 0 ? score / mx : 0;
        const color = scoreColor(ratio);
        html += `<div class="score-bar-row">
            <span class="score-bar-label">${dim}</span>
            <div class="score-bar-track"><div class="score-bar-fill" style="width:${ratio * 100}%;background:${color}"></div></div>
            <span class="score-bar-val" style="color:${color}">${score}/${mx}</span>
        </div>`;
    }
    html += '</div>';

    for (const [dim, lines] of Object.entries(ai.details)) {
        html += `<div class="card"><h3>${dim} : ${ai.dims[dim]}/${ai.maxD[dim]}</h3>`;
        for (const line of lines) html += `<p style="margin:.2rem 0;font-size:.85rem">• ${line}</p>`;
        html += '</div>';
    }

    html += navButtons(5, 7, 'Gouvernance →');
    return html;
}

// STEP 8: RECOMMENDATIONS
// ═══════════════════════════════════════════════════════════════
function generateRecos() {
    const recos = [];
    const q = APP.qualityReport || analyzeQuality();
    const m = APP.metadata;

    if (q.missingPct > 20) recos.push(['urgent', 'Compléter les données', `Taux de valeurs manquantes élevé (${q.missingPct}%). Appliquer une stratégie d'imputation ou documenter les raisons.`]);
    else if (q.missingPct > 5) recos.push(['important', 'Réduire les valeurs manquantes', `${q.missingPct}% de valeurs manquantes. Vérifier les colonnes critiques.`]);
    if (q.n_duplicates > 0) recos.push(['important', 'Supprimer les doublons', `${q.n_duplicates} ligne(s) en doublon détectée(s).`]);
    if (q.emptyCols.length > 0) recos.push(['urgent', 'Supprimer les colonnes vides', `${q.emptyCols.length} colonne(s) vide(s) : ${q.emptyCols.join(', ')}`]);

    const missingMeta = ['title','author','description','license','keywords','contact'].filter(f => !m[f]);
    if (missingMeta.length > 0) recos.push([missingMeta.length > 3 ? 'urgent' : 'important', 'Compléter les métadonnées', `Champs manquants : ${missingMeta.join(', ')}`]);

    const nUndoc = APP.columns.length - APP.columns.filter(c => APP.variableDocs[c]).length;
    if (nUndoc > 0) recos.push(['important', 'Documenter les variables', `${nUndoc} variable(s) non documentée(s).`]);
    if (!m.license) recos.push(['urgent', 'Ajouter une licence', 'CC-BY 4.0 est recommandée pour les données ouvertes.']);

    const badNames = APP.columns.filter(c => c.length <= 2 || c.startsWith('Unnamed')).length;
    if (badNames > 0) recos.push(['important', 'Améliorer les noms de colonnes', `${badNames} colonne(s) avec des noms peu explicites.`]);

    const sensitiveKw = ['nom','name','prenom','telephone','phone','email','adresse','address'];
    const sensitive = APP.columns.filter(c => sensitiveKw.some(k => c.toLowerCase().includes(k)));
    if (sensitive.length > 0) recos.push(['important', 'Anonymiser les données sensibles', `Colonnes sensibles : ${sensitive.join(', ')}`]);

    recos.push(['improve', 'Déposer sur un entrepôt', 'Déposer le dataset sur Zenodo ou Dataverse pour obtenir un DOI pérenne (principe FAIR).']);

    const order = { urgent: 0, important: 1, improve: 2 };
    recos.sort((a, b) => order[a[0]] - order[b[0]]);
    return recos;
}

function renderChangeLog() {
    const ini = APP.initialStats;
    if (!ini) return '';
    let curMissing = 0;
    for (const col of APP.columns) curMissing += countMissing(col);
    const curDup = countDuplicates();
    const addedCols = APP.columns.filter(c => !ini.columns.includes(c));
    const removedCols = ini.columns.filter(c => !APP.columns.includes(c));

    let html = `<div class="card" style="margin-top:1.5rem"><h3>📋 Bilan des modifications</h3>`;
    html += `<h4 style="margin:.8rem 0 .5rem;font-size:.9rem;color:#555">Comparatif avant / après</h4>`;
    html += `<div class="table-wrap"><table><tr><th>Indicateur</th><th>Avant</th><th>Après</th><th>Évolution</th></tr>`;
    function diffBadge(before, after, lowerIsBetter) {
        const d = after - before;
        if (d === 0) return '<span style="color:#888">-</span>';
        const good = lowerIsBetter ? d < 0 : d > 0;
        const color = good ? 'var(--primary)' : 'var(--danger)';
        return `<span style="color:${color};font-weight:700">${d > 0 ? '+' : ''}${d}</span>`;
    }
    html += `<tr><td>Lignes</td><td>${ini.rows}</td><td>${APP.data.length}</td><td>${diffBadge(ini.rows, APP.data.length, false)}</td></tr>`;
    html += `<tr><td>Colonnes</td><td>${ini.cols}</td><td>${APP.columns.length}</td><td>${diffBadge(ini.cols, APP.columns.length, false)}</td></tr>`;
    html += `<tr><td>Valeurs manquantes</td><td>${ini.missing}</td><td>${curMissing}</td><td>${diffBadge(ini.missing, curMissing, true)}</td></tr>`;
    html += `<tr><td>Doublons</td><td>${ini.duplicates}</td><td>${curDup}</td><td>${diffBadge(ini.duplicates, curDup, true)}</td></tr>`;
    html += '</table></div>';
    if (removedCols.length) html += `<p style="font-size:.85rem;margin-top:.5rem">🗑️ Colonnes supprimées : <strong>${removedCols.join(', ')}</strong></p>`;
    if (addedCols.length) html += `<p style="font-size:.85rem;margin-top:.3rem">➕ Colonnes ajoutées : <strong>${addedCols.join(', ')}</strong></p>`;

    html += '</div>';
    return html;
}

function dataToCSV() {
    return Papa.unparse(APP.data, { columns: APP.columns });
}

function buildExcelBuffer(withStyle) {
    const ws = XLSX.utils.json_to_sheet(APP.data, { header: APP.columns });
    if (withStyle) {
        const range = XLSX.utils.decode_range(ws['!ref']);
        const colWidths = APP.columns.map(c => {
            let max = c.length;
            for (const row of APP.data) {
                const v = row[c];
                if (v != null) max = Math.max(max, String(v).length);
            }
            return { wch: Math.min(max + 2, 40) };
        });
        ws['!cols'] = colWidths;
        for (let C = range.s.c; C <= range.e.c; C++) {
            const addr = XLSX.utils.encode_cell({ r: 0, c: C });
            if (!ws[addr]) continue;
            ws[addr].s = {
                font: { bold: true, color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '1B5E20' } },
                alignment: { horizontal: 'center' },
                border: { bottom: { style: 'thin', color: { rgb: '000000' } } }
            };
        }
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Données');
    return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
}

function exportData() {
    if (APP.inputFormat === 'xlsx') {
        const el = document.getElementById('export-styling');
        const styled = el ? el.checked : false;
        const buf = buildExcelBuffer(styled);
        const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        saveAs(blob, 'donnees_corrigees.xlsx');
    } else if (APP.inputFormat === 'json') {
        const blob = new Blob([JSON.stringify(APP.data, null, 2)], { type: 'application/json;charset=utf-8;' });
        saveAs(blob, 'donnees_corrigees.json');
    } else {
        const blob = new Blob([dataToCSV()], { type: 'text/csv;charset=utf-8;' });
        saveAs(blob, 'donnees_corrigees.csv');
    }
}

    doc += `<img class="topbar-brand-logo" src="assets/logo_afridata_ready_white.png" alt="AfriData Ready">`;
    doc += `<p class="subtitle">From Raw Data to FAIR & AI-Ready Data</p>`;
    doc += `<p><strong>Fichier traité :</strong> ${APP.fileName}</p>`;
    doc += `<p><strong>Date :</strong> ${date} à ${time}</p>`;
    if (m.author) doc += `<p><strong>Auteur :</strong> ${m.author}</p>`;

    doc += `<h2>1. Description du fichier initial</h2>`;
    doc += `<p>Le fichier <strong>${APP.fileName}</strong> contenait initialement :</p>`;
    doc += `<ul>
        <li><strong>${ini.rows || '?'}</strong> lignes</li>

    doc += `<table><tr><th>Indicateur</th><th>Avant</th><th>Après</th><th>Évolution</th></tr>`;
    function evol(before, after, lowerIsBetter) {
        const d = after - before;
        if (d === 0) return '=';
        const good = lowerIsBetter ? d < 0 : d > 0;
        return (d > 0 ? '+' : '') + d + (good ? ' ✓' : ' ✗');
    }
    doc += `<tr><td>Lignes</td><td>${ini.rows}</td><td>${APP.data.length}</td><td>${evol(ini.rows, APP.data.length, false)}</td></tr>`;
    doc += `<tr><td>Colonnes</td><td>${ini.cols}</td><td>${APP.columns.length}</td><td>${evol(ini.cols, APP.columns.length, false)}</td></tr>`;
    doc += `<tr><td>Valeurs manquantes</td><td>${ini.missing}</td><td>${curMissing}</td><td>${evol(ini.missing, curMissing, true)}</td></tr>`;

    doc += `</table>`;

    if (addedCols.length) doc += `<p>Colonnes ajoutées : <strong>${addedCols.join(', ')}</strong></p>`;

    doc += `<h2>3. Détail des actions effectuées</h2>`;

        }
        doc += `<h3>Résumé par type d'action</h3><ul>`;
        for (const [action, count] of Object.entries(actionSummary)) {
            doc += `<li>${action} : <strong>${count} fois</strong></li>`;
        }
        doc += `</ul>`;
    }

    doc += `<h2>4. État final du jeu de données</h2>`;
    doc += `<div class="highlight"><p>Le fichier corrigé contient <strong>${APP.data.length} lignes</strong> et <strong>${APP.columns.length} colonnes</strong>.</p>`;

    doc += `<br><hr><p style="text-align:center;color:#888;font-size:9pt">Rapport généré par AfriData Ready : From Raw Data to FAIR & AI-Ready Data</p>`;
    doc += `</body></html>`;
    return doc;
}
