// ═══════════════════════════════════════════════════════════════
// AfriData Quality Index (AQI)
// Moyenne pondérée inspirée d'ISO 8000 / ISO 25012 / ISO 11179 /
// Dublin Core / DataCite / FAIR / RGPD : évaluation interne.
// ═══════════════════════════════════════════════════════════════
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
const AQI_WEIGHTS = { intrinseque: 0.30, documentation: 0.20, fair: 0.20, ai: 0.20, securite: 0.10 };

function pearson(a, b) {
    const n = a.length;
    if (n < 3) return NaN;
    let sx = 0, sy = 0, sxy = 0, sx2 = 0, sy2 = 0;
    for (let i = 0; i < n; i++) { sx += a[i]; sy += b[i]; sxy += a[i] * b[i]; sx2 += a[i] * a[i]; sy2 += b[i] * b[i]; }
    const num = n * sxy - sx * sy;
    const den = Math.sqrt((n * sx2 - sx * sx) * (n * sy2 - sy * sy));
    return den === 0 ? NaN : num / den;
}

function computeAQI() {
    const df = APP.data, cols = APP.columns;
    const q = APP.qualityReport || analyzeQuality();
    const fair = APP.fairScore || computeFAIR();
    const ai = APP.aiScore || computeAI();
    const m = APP.metadata;
    const d = {}; for (const c of cols) if (APP.variableDocs[c]) d[c] = APP.variableDocs[c];
    const n = df.length, nc = cols.length, totalCells = (n * nc) || 1;

    // 1. Qualité intrinsèque (ISO 8000 / 25012)
    let totalMiss = 0; cols.forEach(c => totalMiss += countMissing(c));
    const completeness = 100 * (1 - totalMiss / totalCells);
    const uniqueness = 100 * (1 - (n > 0 ? countDuplicates() / n : 0));
    const emptyCols = cols.filter(c => countMissing(c) === n).length;
    const badNames = cols.filter(c => c.length <= 2 || c.startsWith('Unnamed') || /^col\d+$/i.test(c)).length;
    const validity = clamp(100 * (1 - (emptyCols + badNames) / (2 * (nc || 1))), 0, 100);
    const consistIssues = (q.issues || []).filter(i => i.type === 'inconsistent' || i.type === 'date').length;
    const consistency = clamp(100 - consistIssues * 15, 0, 100);
    const intrinseque = (completeness + uniqueness + validity + consistency) / 4;

    // 2. Documentation et métadonnées (ISO 11179 / Dublin Core / DataCite)
    const docRatio = nc > 0 ? Object.keys(d).length / nc : 0;
    const metaKeys = ['title', 'author', 'description', 'license', 'keywords', 'version', 'contact', 'collection_method', 'geographic_area', 'citation'];
    const metaRatio = metaKeys.filter(k => m[k]).length / metaKeys.length;
    const documentation = 100 * (0.6 * docRatio + 0.4 * metaRatio);

    // 3 & 4. FAIR + AI Readiness (réutilisés)
    const fairScore = fair.total;
    const aiScore = ai.total;

    // 5. Sécurité et confidentialité (RGPD / ISO 25012)
    const sensitiveKw = ['nom', 'name', 'prenom', 'surname', 'telephone', 'phone', 'email', 'adresse', 'address', 'ssn', 'cin', 'passport', 'ip'];
    const sensitiveCols = cols.filter(c => sensitiveKw.some(k => c.toLowerCase().includes(k)));
    const unhandledPII = sensitiveCols.filter(c => !(APP.anonymizedCols || []).includes(c));
    let securite = 100 - unhandledPII.length * 15;
    if (APP.editHistory.length > 0) securite += 5; // bonus traçabilité (lineage)
    securite = clamp(securite, 0, 100);

    const dims = { intrinseque, documentation, fair: fairScore, ai: aiScore, securite };
    const total = Math.round(
        AQI_WEIGHTS.intrinseque * intrinseque +
        AQI_WEIGHTS.documentation * documentation +
        AQI_WEIGHTS.fair * fairScore +
        AQI_WEIGHTS.ai * aiScore +
        AQI_WEIGHTS.securite * securite
    );
    const level = total < 40 ? ['Faible', '#C62828'] : total < 60 ? ['Moyen', '#F57F17'] : total < 80 ? ['Bon', '#2E7D32'] : ['Excellent', '#1B5E20'];

    const subs = { completeness, uniqueness, validity, consistency, docRatio: docRatio * 100, metaRatio: metaRatio * 100, sensitiveCols, unhandledPII };
    const recos = [];
    if (intrinseque < 70) recos.push(['Qualité intrinsèque', 'Réduire les valeurs manquantes/doublons et corriger les formats incohérents (étapes 2-3).']);
    if (documentation < 70) recos.push(['Documentation', 'Compléter le dictionnaire des variables et les métadonnées clés (étapes 4-5).']);
    if (fairScore < 70) recos.push(['FAIR', 'Ajouter licence, mots-clés, contact et citation pour améliorer le score FAIR (étape 6).']);
    if (aiScore < 70) recos.push(['AI Readiness', 'Identifier une variable cible et améliorer la structure/documentation (étape 7).']);
    if (securite < 80 && sensitiveCols.length) recos.push(['Sécurité', `Anonymiser ou pseudonymiser les colonnes sensibles : ${sensitiveCols.join(', ')}.`]);

    return { total, dims, weights: AQI_WEIGHTS, level, subs, recos };
}

// TOOLKIT GRAPHIQUE : SVG pur (aucune dépendance, 100% local)

const CHART_COLORS = ['#1B5E20', '#4CAF50', '#FF6F00', '#1565C0', '#6A1B9A', '#00838F', '#C62828', '#558B2F'];

function svgGauge(value, label) {
    const v = clamp(value, 0, 100), angle = -90 + (v / 100) * 180;
    const cx = 150, cy = 150, r = 110;
    const color = v < 40 ? '#C62828' : v < 60 ? '#F57F17' : v < 80 ? '#2E7D32' : '#1B5E20';
    function arc(a0, a1, col) {
        const p0 = [cx + r * Math.cos(a0 * Math.PI / 180), cy + r * Math.sin(a0 * Math.PI / 180)];
        const p1 = [cx + r * Math.cos(a1 * Math.PI / 180), cy + r * Math.sin(a1 * Math.PI / 180)];
        const large = (a1 - a0) > 180 ? 1 : 0;
        return `<path d="M${p0[0]} ${p0[1]} A${r} ${r} 0 ${large} 1 ${p1[0]} ${p1[1]}" fill="none" stroke="${col}" stroke-width="22" stroke-linecap="round"/>`;
    }
    const nx = cx + (r - 5) * Math.cos(angle * Math.PI / 180), ny = cy + (r - 5) * Math.sin(angle * Math.PI / 180);
    return `<svg viewBox="0 0 300 190" style="max-width:320px;width:100%">
        ${arc(-90, 90, '#E0E0E0')}
        ${arc(-90, angle, color)}
        <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#333" stroke-width="3"/>
        <circle cx="${cx}" cy="${cy}" r="7" fill="#333"/>
        <text x="${cx}" y="${cy - 30}" text-anchor="middle" font-size="40" font-weight="800" fill="${color}">${Math.round(v)}</text>
        <text x="${cx}" y="${cy - 8}" text-anchor="middle" font-size="13" fill="#888">/ 100</text>
        <text x="${cx}" y="${cy + 30}" text-anchor="middle" font-size="14" font-weight="700" fill="${color}">${label || ''}</text>
    </svg>`;
}

function svgRadar(dimsObj) {
    const entries = Object.entries(dimsObj);
    const N = entries.length, cx = 170, cy = 160, R = 110;
    let grid = '';
    for (let g = 1; g <= 4; g++) {
        const rr = R * g / 4;
        const pts = entries.map((_, i) => {
            const a = -Math.PI / 2 + i * 2 * Math.PI / N;
            return `${cx + rr * Math.cos(a)},${cy + rr * Math.sin(a)}`;
        }).join(' ');
        grid += `<polygon points="${pts}" fill="none" stroke="#e0e0e0" stroke-width="1"/>`;
    }
    let axes = '', labels = '';
    entries.forEach(([name, val], i) => {
        const a = -Math.PI / 2 + i * 2 * Math.PI / N;
        const ex = cx + R * Math.cos(a), ey = cy + R * Math.sin(a);
        axes += `<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#e0e0e0"/>`;
        const lx = cx + (R + 22) * Math.cos(a), ly = cy + (R + 22) * Math.sin(a);
        labels += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="10.5" fill="#555">${name}</text>`;
    });
    const poly = entries.map(([_, val], i) => {
        const a = -Math.PI / 2 + i * 2 * Math.PI / N, rr = R * clamp(val, 0, 100) / 100;
        return `${cx + rr * Math.cos(a)},${cy + rr * Math.sin(a)}`;
    }).join(' ');
    return `<svg viewBox="0 0 340 330" style="max-width:380px;width:100%">
        ${grid}${axes}
        <polygon points="${poly}" fill="rgba(76,175,80,.35)" stroke="#1B5E20" stroke-width="2"/>
        ${labels}
    </svg>`;
}

function svgBarCompare(rows) {
    const bh = 26, gap = 20, w = 460, left = 150, top = 20;
    const h = top + rows.length * (bh * 2 + gap);
    let s = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:640px">`;
    rows.forEach((r, i) => {
        const y = top + i * (bh * 2 + gap);
        const mx = r.max || Math.max(r.before, r.after, 1);
        const wb = (w - left - 60) * clamp(r.before / mx, 0, 1);
        const wa = (w - left - 60) * clamp(r.after / mx, 0, 1);
        s += `<text x="0" y="${y + bh}" font-size="12" font-weight="600" fill="#333">${r.label}</text>`;
        s += `<rect x="${left}" y="${y}" width="${wb}" height="${bh - 4}" fill="#BDBDBD" rx="3"/><text x="${left + wb + 5}" y="${y + bh - 8}" font-size="11" fill="#888">${r.before}${r.suffix || ''}</text>`;
        s += `<rect x="${left}" y="${y + bh}" width="${wa}" height="${bh - 4}" fill="${r.good === false ? '#C62828' : '#4CAF50'}" rx="3"/><text x="${left + wa + 5}" y="${y + bh * 2 - 8}" font-size="11" font-weight="700" fill="#2E7D32">${r.after}${r.suffix || ''}</text>`;
    });
    s += `<text x="${left}" y="${h - 2}" font-size="10" fill="#aaa">■ Avant (gris) &nbsp; ■ Après (vert)</text></svg>`;
    return s;
}

function svgHistogram(values, title) {
    if (!values.length) return '';
    const min = Math.min(...values), max = Math.max(...values);
    const bins = Math.min(12, Math.max(5, Math.ceil(Math.sqrt(values.length))));
    const bw = (max - min) / bins || 1;
    const counts = new Array(bins).fill(0);
    values.forEach(v => { let b = Math.floor((v - min) / bw); if (b >= bins) b = bins - 1; if (b < 0) b = 0; counts[b]++; });
    const cmax = Math.max(...counts), W = 300, H = 160, pad = 28;
    let bars = '';
    counts.forEach((c, i) => {
        const bh = (H - pad - 14) * (c / cmax);
        const x = pad + i * (W - pad - 6) / bins;
        bars += `<rect x="${x}" y="${H - 14 - bh}" width="${(W - pad - 6) / bins - 2}" height="${bh}" fill="#4CAF50" rx="1.5"/>`;
    });
    return `<div style="display:inline-block;margin:.4rem;text-align:center"><div style="font-size:.8rem;font-weight:600;color:#2E7D32">${title}</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:300px;max-width:100%">
        <line x1="${pad}" y1="${H - 14}" x2="${W}" y2="${H - 14}" stroke="#ccc"/>
        ${bars}
        <text x="${pad}" y="${H - 2}" font-size="9" fill="#999">${(+min.toFixed(2))}</text>
        <text x="${W}" y="${H - 2}" text-anchor="end" font-size="9" fill="#999">${(+max.toFixed(2))}</text>
    </svg></div>`;
}

function svgBoxplot(col) {
    const vals = numericValues(col).sort((a, b) => a - b);
    if (vals.length < 4) return '';
    const qt = p => vals[Math.floor((vals.length - 1) * p)];
    const q1 = qt(0.25), med = qt(0.5), q3 = qt(0.75), iqr = q3 - q1;
    const lo = q1 - 1.5 * iqr, hi = q3 + 1.5 * iqr;
    const wmin = Math.max(vals[0], lo), wmax = Math.min(vals[vals.length - 1], hi);
    const outliers = vals.filter(v => v < lo || v > hi);
    const dmin = vals[0], dmax = vals[vals.length - 1], span = (dmax - dmin) || 1;
    const W = 300, H = 90, pad = 10, y = 40;
    const sx = v => pad + (W - 2 * pad) * (v - dmin) / span;
    let out = outliers.slice(0, 40).map(v => `<circle cx="${sx(v)}" cy="${y}" r="2.5" fill="#C62828"/>`).join('');
    return `<div style="display:inline-block;margin:.4rem;text-align:center"><div style="font-size:.8rem;font-weight:600;color:#2E7D32">${col}${outliers.length ? ` : ${outliers.length} outlier(s)` : ''}</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:300px;max-width:100%">
        <line x1="${sx(wmin)}" y1="${y}" x2="${sx(q1)}" y2="${y}" stroke="#555"/>
        <line x1="${sx(q3)}" y1="${y}" x2="${sx(wmax)}" y2="${y}" stroke="#555"/>
        <line x1="${sx(wmin)}" y1="${y - 8}" x2="${sx(wmin)}" y2="${y + 8}" stroke="#555"/>
        <line x1="${sx(wmax)}" y1="${y - 8}" x2="${sx(wmax)}" y2="${y + 8}" stroke="#555"/>
        <rect x="${sx(q1)}" y="${y - 14}" width="${sx(q3) - sx(q1)}" height="28" fill="rgba(76,175,80,.35)" stroke="#1B5E20"/>
        <line x1="${sx(med)}" y1="${y - 14}" x2="${sx(med)}" y2="${y + 14}" stroke="#1B5E20" stroke-width="2"/>
        ${out}
        <text x="${pad}" y="${H - 4}" font-size="9" fill="#999">${(+dmin.toFixed(2))}</text>
        <text x="${W - pad}" y="${H - 4}" text-anchor="end" font-size="9" fill="#999">${(+dmax.toFixed(2))}</text>
    </svg></div>`;
}

function svgScatter(colX, colY) {
    const pts = APP.data.map(r => [parseFloat(r[colX]), parseFloat(r[colY])]).filter(p => !isNaN(p[0]) && !isNaN(p[1]));
    if (pts.length < 3) return '';
    const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
    const xmin = Math.min(...xs), xmax = Math.max(...xs), ymin = Math.min(...ys), ymax = Math.max(...ys);
    const W = 320, H = 240, pad = 34;
    const sx = v => pad + (W - pad - 8) * (v - xmin) / ((xmax - xmin) || 1);
    const sy = v => (H - pad) - (H - pad - 8) * (v - ymin) / ((ymax - ymin) || 1);
    const r = pearson(xs, ys);
    const dots = pts.slice(0, 800).map(p => `<circle cx="${sx(p[0])}" cy="${sy(p[1])}" r="2.5" fill="rgba(27,94,32,.55)"/>`).join('');
    return `<div style="display:inline-block;margin:.4rem;text-align:center"><div style="font-size:.8rem;font-weight:600;color:#2E7D32">${colX} vs ${colY} ${isNaN(r) ? '' : `(r=${r.toFixed(2)})`}</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:320px;max-width:100%">
        <line x1="${pad}" y1="${H - pad}" x2="${W}" y2="${H - pad}" stroke="#ccc"/>
        <line x1="${pad}" y1="8" x2="${pad}" y2="${H - pad}" stroke="#ccc"/>
        ${dots}
        <text x="${pad}" y="${H - 4}" font-size="9" fill="#999">${colX}</text>
        <text x="6" y="16" font-size="9" fill="#999">${colY}</text>
    </svg></div>`;
}

function svgCorrMatrix(numCols) {
    if (numCols.length < 2) return '<p style="color:#888">Pas assez de colonnes numériques (min. 2).</p>';
    const cols = numCols.slice(0, 10);
    const data = cols.map(c => APP.data.map(r => parseFloat(r[c])));
    const N = cols.length, cell = Math.min(46, Math.floor(380 / N)), off = 90, top = 90;
    let s = `<svg viewBox="0 0 ${off + N * cell + 10} ${top + N * cell + 10}" style="width:100%;max-width:560px">`;
    cols.forEach((c, j) => {
        s += `<text x="${off - 5}" y="${top + j * cell + cell / 2 + 3}" text-anchor="end" font-size="9" fill="#555">${c.slice(0, 12)}</text>`;
        s += `<text x="${off + j * cell + cell / 2}" y="${top - 5}" text-anchor="start" font-size="9" fill="#555" transform="rotate(-45 ${off + j * cell + cell / 2} ${top - 5})">${c.slice(0, 12)}</text>`;
    });
    for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        const pairs = data[i].map((v, k) => [v, data[j][k]]).filter(p => !isNaN(p[0]) && !isNaN(p[1]));
        const r = i === j ? 1 : pearson(pairs.map(p => p[0]), pairs.map(p => p[1]));
        const rr = isNaN(r) ? 0 : r;
        const col = rr >= 0 ? `rgba(27,94,32,${Math.abs(rr)})` : `rgba(198,40,40,${Math.abs(rr)})`;
        s += `<rect x="${off + j * cell}" y="${top + i * cell}" width="${cell - 1}" height="${cell - 1}" fill="${col}"/>`;
        if (cell > 30) s += `<text x="${off + j * cell + cell / 2}" y="${top + i * cell + cell / 2 + 3}" text-anchor="middle" font-size="8.5" fill="${Math.abs(rr) > 0.5 ? '#fff' : '#333'}">${isNaN(r) ? '-' : rr.toFixed(1)}</text>`;
    }
    s += '</svg>';
    return s;
}

function svgMissingHeatmap() {
    const cols = APP.columns, n = APP.data.length;
    const maxRows = 60, rows = Math.min(n, maxRows);
    const cw = Math.min(34, Math.floor(560 / cols.length)), ch = Math.max(2, Math.floor(220 / rows)), top = 80;
    let s = `<svg viewBox="0 0 ${cols.length * cw + 10} ${top + rows * ch + 10}" style="width:100%;max-width:640px">`;
    cols.forEach((c, j) => {
        s += `<text x="${j * cw + cw / 2}" y="${top - 5}" text-anchor="start" font-size="9" fill="#555" transform="rotate(-45 ${j * cw + cw / 2} ${top - 5})">${c.slice(0, 14)}</text>`;
    });
    for (let i = 0; i < rows; i++) {
        const ri = Math.floor(i * n / rows);
        cols.forEach((c, j) => {
            const miss = isNull(APP.data[ri][c]);
            s += `<rect x="${j * cw}" y="${top + i * ch}" width="${cw - 1}" height="${ch}" fill="${miss ? '#C62828' : '#E8F5E9'}"/>`;
        });
    }
    s += `<text x="0" y="${top + rows * ch + 8}" font-size="9" fill="#aaa">■ manquant (rouge) &nbsp; ■ présent (vert) : échantillon de ${rows} lignes</text></svg>`;
    return s;
}

function svgAqiProgress(history, current) {
    const pts = [...history];
    if (!pts.length || pts[pts.length - 1].score !== current) pts.push({ label: 'Actuel', score: current });
    if (pts.length < 2) return '<p style="color:#888;font-size:.85rem">La progression s\'affichera au fil de vos corrections.</p>';
    const W = 640, H = 220, padL = 36, padB = 40, padT = 16;
    const sx = i => padL + (W - padL - 14) * i / (pts.length - 1);
    const sy = v => padT + (H - padT - padB) * (1 - v / 100);
    let grid = '';
    for (const g of [0, 25, 50, 75, 100]) grid += `<line x1="${padL}" y1="${sy(g)}" x2="${W}" y2="${sy(g)}" stroke="#eee"/><text x="${padL - 5}" y="${sy(g) + 3}" text-anchor="end" font-size="9" fill="#999">${g}</text>`;
    grid += `<line x1="${padL}" y1="${sy(AQI_TARGET)}" x2="${W}" y2="${sy(AQI_TARGET)}" stroke="#FF6F00" stroke-dasharray="5,4"/><text x="${W}" y="${sy(AQI_TARGET) - 4}" text-anchor="end" font-size="9" fill="#FF6F00">Objectif ${AQI_TARGET}</text>`;
    const line = pts.map((p, i) => `${sx(i)},${sy(p.score)}`).join(' ');
    let dots = '', labels = '';
    pts.forEach((p, i) => {
        dots += `<circle cx="${sx(i)}" cy="${sy(p.score)}" r="4" fill="#1B5E20"/><text x="${sx(i)}" y="${sy(p.score) - 8}" text-anchor="middle" font-size="10" font-weight="700" fill="#1B5E20">${p.score}</text>`;
        labels += `<text x="${sx(i)}" y="${H - padB + 14}" text-anchor="middle" font-size="8.5" fill="#777" transform="rotate(25 ${sx(i)} ${H - padB + 14})">${p.label.slice(0, 14)}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:700px">${grid}
        <polyline points="${line}" fill="none" stroke="#4CAF50" stroke-width="2.5"/>${dots}${labels}</svg>`;
}

// ── Interprétations automatiques (phrases explicatives) ──
function interpBox(lines) {
    if (!lines || !lines.length) return '';
    return `<div style="background:#E3F2FD;border-left:4px solid #1565C0;border-radius:8px;padding:.7rem 1rem;margin-top:.8rem;font-size:.86rem;line-height:1.5">
        <strong style="color:#1565C0">💡 Analyse &amp; interprétation</strong><br>${lines.map(l => '• ' + l).join('<br>')}</div>`;
}

function interpAQI(aqi) {
    const L = [];
    L.push(`L'AQI global est de <strong>${aqi.total}/100</strong>, ce qui correspond à un niveau <strong>${aqi.level[0].toLowerCase()}</strong> de maturité du jeu de données.`);
    const dimNames = { intrinseque: 'la qualité intrinsèque', documentation: 'la documentation', fair: 'le score FAIR', ai: "l'AI Readiness", securite: 'la sécurité' };
    const entries = Object.entries(aqi.dims);
    const best = entries.reduce((a, b) => b[1] > a[1] ? b : a);
    const worst = entries.reduce((a, b) => b[1] < a[1] ? b : a);
    L.push(`Le point fort est <strong>${dimNames[best[0]]}</strong> (${Math.round(best[1])}/100) ; l'axe à améliorer en priorité est <strong>${dimNames[worst[0]]}</strong> (${Math.round(worst[1])}/100).`);
    if (aqi.total >= 80) L.push('Le jeu de données est prêt à être publié et exploité pour l\'analyse ou l\'IA.');
    else if (aqi.total >= 60) L.push('Le jeu de données est de bonne qualité ; quelques améliorations le rendraient pleinement exploitable.');
    else L.push('Des améliorations sont recommandées avant toute exploitation ou publication.');
    return L;
}

function interpBeforeAfter(ini, curMiss, docCount, aqi, base) {
    const L = [];
    const missDelta = (ini.missing ?? 0) - curMiss;
    if (missDelta > 0) L.push(`<strong>${missDelta}</strong> valeur(s) manquante(s) ont été traitées (${ini.missing} → ${curMiss}).`);
    else if ((ini.missing ?? 0) > 0) L.push(`Il reste <strong>${curMiss}</strong> valeur(s) manquante(s) : envisagez une imputation ou une suppression (étape 3).`);
    else L.push('Aucune valeur manquante : complétude parfaite.');
    const dupDelta = (ini.duplicates ?? 0) - countDuplicates();
    if (dupDelta > 0) L.push(`<strong>${dupDelta}</strong> doublon(s) supprimé(s).`);
    if (docCount > (base.docs ?? 0)) L.push(`<strong>${docCount}</strong> variable(s) désormais documentée(s).`);
    const aqiDelta = aqi.total - (base.aqi ?? 0);
    if (aqiDelta > 0) L.push(`Grâce à ces corrections, l'AQI a progressé de <strong>+${aqiDelta} points</strong> (${base.aqi ?? 0} → ${aqi.total}).`);
    else if (aqiDelta === 0) L.push('L\'AQI est inchangé : documentez les variables et complétez les métadonnées pour le faire progresser.');
    return L;
}

function interpMissing(report) {
    const L = [];
    const cols = APP.columns.filter(c => report.missingPerCol[c] > 0).sort((a, b) => report.missingPerCol[b] - report.missingPerCol[a]);
    if (!cols.length) return ['Aucune valeur manquante : la carte est entièrement verte, le jeu de données est complet.'];
    const top = cols[0], topPct = pct(report.missingPerCol[top], APP.data.length);
    L.push(`La colonne la plus incomplète est <strong>${top}</strong> (${topPct}% de valeurs manquantes).`);
    if (report.emptyCols.length) L.push(`<strong>${report.emptyCols.length}</strong> colonne(s) entièrement vide(s) : ${report.emptyCols.join(', ')} : à supprimer.`);
    L.push(`Au total, ${cols.length} colonne(s) présentent des trous. Les zones rouges alignées verticalement indiquent une variable problématique ; alignées horizontalement, une ligne à vérifier.`);
    return L;
}

function interpHistograms(numCols) {
    const L = [];
    for (const c of numCols.slice(0, 6)) {
        const v = numericValues(c);
        if (v.length < 4) continue;
        v.sort((a, b) => a - b);
        const mean = v.reduce((s, x) => s + x, 0) / v.length;
        const median = v[Math.floor(v.length / 2)];
        const skew = mean > median * 1.1 ? 'étalée vers la droite (asymétrie positive : quelques grandes valeurs)' : mean < median * 0.9 ? 'étalée vers la gauche (asymétrie négative)' : 'globalement symétrique';
        L.push(`<strong>${c}</strong> : distribution ${skew} (moyenne ${mean.toFixed(1)}, médiane ${median.toFixed(1)}).`);
    }
    L.push('Une distribution très asymétrique peut justifier une transformation (log) avant modélisation.');
    return L;
}

function interpBoxplots(numCols) {
    const L = [];
    let anyOut = false;
    for (const c of numCols.slice(0, 6)) {
        const v = numericValues(c).sort((a, b) => a - b);
        if (v.length < 4) continue;
        const q1 = v[Math.floor((v.length - 1) * 0.25)], q3 = v[Math.floor((v.length - 1) * 0.75)], iqr = q3 - q1;
        const out = v.filter(x => x < q1 - 1.5 * iqr || x > q3 + 1.5 * iqr).length;
        if (out > 0) { anyOut = true; L.push(`<strong>${c}</strong> : ${out} valeur(s) aberrante(s) au-delà des moustaches (points rouges).`); }
    }
    if (!anyOut) L.push('Aucune valeur aberrante détectée : les points restent dans les moustaches (règle 1,5×IQR).');
    else L.push('Vérifiez si ces valeurs sont des erreurs de saisie (à corriger) ou des observations réelles (à conserver et documenter).');
    return L;
}

function interpCorr(numCols) {
    const cols = numCols.slice(0, 10), L = [];
    let strong = [];
    for (let i = 0; i < cols.length; i++) for (let j = i + 1; j < cols.length; j++) {
        const pairs = APP.data.map(r => [parseFloat(r[cols[i]]), parseFloat(r[cols[j]])]).filter(p => !isNaN(p[0]) && !isNaN(p[1]));
        const r = pearson(pairs.map(p => p[0]), pairs.map(p => p[1]));
        if (!isNaN(r) && Math.abs(r) >= 0.5) strong.push([cols[i], cols[j], r]);
    }
    strong.sort((a, b) => Math.abs(b[2]) - Math.abs(a[2]));
    if (strong.length) {
        for (const [a, b, r] of strong.slice(0, 3)) L.push(`<strong>${a}</strong> et <strong>${b}</strong> sont ${r > 0 ? 'positivement' : 'négativement'} corrélées (r = ${r.toFixed(2)}) : ${r > 0 ? 'elles augmentent ensemble' : "l'une augmente quand l'autre diminue"}.`);
        L.push('Des variables très corrélées (|r|>0,8) peuvent être redondantes pour un modèle (multicolinéarité).');
    } else {
        L.push('Aucune corrélation forte (|r|≥0,5) entre les variables : elles apportent chacune une information distincte.');
    }
    L.push('Vert = corrélation positive, rouge = négative ; plus la couleur est intense, plus le lien est fort.');
    return L;
}

function interpScatter(numCols) {
    const L = [];
    const pairs = [[numCols[0], numCols[1]]];
    if (numCols.length >= 3) pairs.push([numCols[0], numCols[2]]);
    for (const [x, y] of pairs) {
        const pts = APP.data.map(r => [parseFloat(r[x]), parseFloat(r[y])]).filter(p => !isNaN(p[0]) && !isNaN(p[1]));
        const r = pearson(pts.map(p => p[0]), pts.map(p => p[1]));
        if (isNaN(r)) continue;
        const force = Math.abs(r) >= 0.7 ? 'forte' : Math.abs(r) >= 0.4 ? 'modérée' : 'faible';
        L.push(`<strong>${x}</strong> vs <strong>${y}</strong> : relation ${force} (r = ${r.toFixed(2)}). ${Math.abs(r) >= 0.4 ? 'Une tendance ' + (r > 0 ? 'croissante' : 'décroissante') + ' se dégage.' : 'Les points sont dispersés, sans tendance nette.'}`);
    }
    return L;
}

// PAGE : ANALYSE DES DONNÉES (dashboard EDA + AQI)
// ═══════════════════════════════════════════════════════════════
function renderAnalysis() {
    if (!APP.data) return '<div class="card"><p>Veuillez d\'abord importer un fichier (étape 1).</p></div>';
    APP.qualityReport = analyzeQuality();
    APP.fairScore = computeFAIR();
    APP.aiScore = computeAI();
    const aqi = computeAQI();
    APP.aqiScore = aqi;
    const ini = APP.initialStats || {}, base = APP.baseline || {};
    const numCols = APP.columns.filter(c => isNumericCol(c));
    let curMiss = 0; APP.columns.forEach(c => curMiss += countMissing(c));
    const docCount = APP.columns.filter(c => APP.variableDocs[c]).length;
    const dupCount = countDuplicates();
    const outlierCols = Object.keys(APP.qualityReport.outlierDetails || {}).length;
    const missingMeta = ['title', 'author', 'description', 'license', 'contact'].filter(k => !APP.metadata[k]);
    const sensitivePending = sensitiveColumns().filter(c => !(APP.anonymizedCols || []).includes(c));
    const healthItems = [
        { label: 'Complétude', value: `${Math.max(0, 100 - APP.qualityReport.missingPct).toFixed(1)}%`, ok: curMiss === 0, step: 2, detail: curMiss ? `${curMiss} valeur(s) manquante(s)` : 'Aucune valeur manquante' },
        { label: 'Doublons', value: dupCount, ok: dupCount === 0, step: 2, detail: dupCount ? `${dupCount} ligne(s) à supprimer` : 'Aucun doublon' },
        { label: 'Aberrantes', value: outlierCols, ok: outlierCols === 0, step: 2, detail: outlierCols ? `${outlierCols} colonne(s) à vérifier` : 'Aucune colonne signalée' },
        { label: 'Documentation', value: `${docCount}/${APP.columns.length}`, ok: docCount === APP.columns.length, step: 3, detail: `${APP.columns.length - docCount} variable(s) restante(s)` },
        { label: 'Métadonnées', value: `${5 - missingMeta.length}/5`, ok: missingMeta.length === 0, step: 4, detail: missingMeta.length ? `${missingMeta.join(', ')}` : 'Champs clés complets' },
        { label: 'Sécurité', value: sensitivePending.length, ok: sensitivePending.length === 0, step: 7, detail: sensitivePending.length ? `${sensitivePending.join(', ')}` : 'Rien à pseudonymiser' }
    ];
    const priorityItems = healthItems.filter(x => !x.ok).slice(0, 4);
    const readyScore = healthItems.filter(x => x.ok).length;

    let html = `${stepHeaderHTML(8)}`;

    html += `<div class="card" style="border-left:5px solid ${readyScore === healthItems.length ? 'var(--primary)' : 'var(--accent)'}">
        <div style="display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;gap:1rem">
            <div style="min-width:0">
                <h3 style="margin-bottom:.25rem">Vue d'ensemble opérationnelle</h3>
                <p style="font-size:.88rem;color:#666;margin:0">${readyScore}/${healthItems.length} indicateur(s) au vert · AQI ${aqi.total}/100 · ${aqi.total >= AQI_TARGET ? 'objectif atteint' : `${AQI_TARGET - aqi.total} point(s) à gagner`}</p>
            </div>
            <button class="btn btn-primary" style="white-space:nowrap" onclick="goStep(9)">Préparer l'export</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:.75rem;margin-top:1rem">
            ${healthItems.map(item => `<div class="${item.ok ? 'issue info' : 'issue warning'}" style="margin:0;min-height:118px;padding:.85rem;display:grid;grid-template-rows:auto 1fr auto;gap:.35rem;overflow:hidden">
                <div style="display:flex;align-items:center;gap:.45rem;min-width:0">
                    <span aria-hidden="true">${item.ok ? '✅' : '⚠️'}</span>
                    <strong style="font-size:.92rem;line-height:1.15;min-width:0;overflow-wrap:anywhere">${escapeHtml(item.label)}</strong>
                </div>
                <div style="display:flex;align-items:center;min-width:0">
                    <span style="font-size:clamp(1.45rem,2.4vw,2rem);line-height:1;font-weight:800;color:#123;overflow-wrap:anywhere">${escapeHtml(item.value)}</span>
                </div>
                <div style="font-size:.78rem;line-height:1.25;color:#666;overflow-wrap:anywhere">${escapeHtml(item.detail)}</div>
            </div>`).join('')}
        </div>
        ${priorityItems.length ? `<div style="margin-top:1rem;padding-top:.85rem;border-top:1px solid #E0F2F1">
                <h4 style="font-size:.9rem;margin:0 0 .55rem;color:#555">Priorités recommandées</h4>
                <div style="display:flex;flex-wrap:wrap;gap:.5rem">
                    ${priorityItems.map(item => `<button class="btn btn-secondary btn-sm" style="white-space:normal;text-align:left" onclick="goStep(${item.step})">Corriger : ${escapeHtml(item.label)}</button>`).join('')}
                </div>
            </div>` : `<p style="font-size:.86rem;color:var(--primary);font-weight:700;margin-top:1rem">Tous les indicateurs clés sont au vert. Vous pouvez exporter le data product.</p>`}
    </div>`;

    // AQI
    html += `<div class="card"><h3>🏅 AfriData Quality Index (AQI)</h3>

    } else {

    }

    html += `<div class="nav-buttons"><div><button class="btn btn-secondary" onclick="goStep(7)">← Gouvernance</button></div>
        <div><button class="btn btn-primary" onclick="goStep(9)">Exporter →</button></div></div>`;

// ═══════════════════════════════════════════════════════════════
// ASSISTANT AfriData : objectif AQI, gains simulés, corrections auto
// Les gains affichés sont calculés par SIMULATION RÉELLE : l'action
// est appliquée sur une copie de l'état, l'AQI recalculé, puis
// l'état restauré. Jamais d'estimation codée en dur.
// ═══════════════════════════════════════════════════════════════

// Description automatique d'une variable (heuristique locale)
function autoDescribe(col) {
    const unitGuess = /_ha$|surface/i.test(col) ? 'hectares' : /_kg$|poids|weight/i.test(col) ? 'kg' : /pct|percent|taux/i.test(col) ? '%' : /date|annee|year/i.test(col) ? '' : '';
    if (isNumericCol(col)) {
        const v = numericValues(col);
        if (v.length) {
            const mn = Math.min(...v), mx = Math.max(...v);
            const mean = v.reduce((s, x) => s + x, 0) / v.length;
            return { description: `Variable numérique (min ${+mn.toFixed(2)}, max ${+mx.toFixed(2)}, moyenne ${+mean.toFixed(2)})${unitGuess ? ' : ' + unitGuess : ''} [suggestion automatique]`, data_type: 'Numérique', unit: unitGuess, example: String(v[0]) };
        }
    }
    const vals = APP.data.map(r => r[col]).filter(v => !isNull(v)).map(String);
    const uniq = [...new Set(vals)];
    if (uniq.length) {
        const isDate = /date|annee|year|mois/i.test(col);
        return { description: `Variable ${isDate ? 'de date' : 'catégorielle'} (${uniq.length} modalité(s)${uniq.length <= 6 ? ' : ' + uniq.slice(0, 6).join(', ') : ''}) [suggestion automatique]`, data_type: isDate ? 'Date' : 'Texte/Catégorie', example: vals[0] };
    }
    return { description: 'Colonne vide [suggestion automatique]', data_type: 'Inconnu' };
}

// Simule une mutation, recalcule l'AQI, restaure l'état, retourne le score
function simulateAQI(mutator) {
    const snap = {
        data: APP.data, columns: APP.columns, variableDocs: APP.variableDocs,
        metadata: APP.metadata, editHistory: APP.editHistory, anonymizedCols: APP.anonymizedCols,
        qualityReport: APP.qualityReport, fairScore: APP.fairScore, aiScore: APP.aiScore
    };
    try {
        mutator(); // doit produire de NOUVEAUX objets/tableaux, jamais muter les existants
        // L'application réelle créera une entrée de journal (bonus traçabilité) : on la simule aussi
        APP.editHistory = APP.editHistory.concat([{ sim: true }]);
        APP.qualityReport = null; APP.fairScore = null; APP.aiScore = null;
        APP.qualityReport = analyzeQuality();
        APP.fairScore = computeFAIR();
        APP.aiScore = computeAI();
        return computeAQI().total;
    } finally {
        Object.assign(APP, snap);
    }
}

// ── Mutateurs : version simulable (copie) et version appliquée ──
function mutDropEmptyCols() {
    const empty = APP.columns.filter(c => countMissing(c) === APP.data.length);
    APP.columns = APP.columns.filter(c => !empty.includes(c));
    return empty;
}
function mutDedupe() {
    const seen = new Set();
    APP.data = APP.data.filter(row => {
        const key = APP.columns.map(c => String(row[c] ?? '')).join('|');
        if (seen.has(key)) return false;
        seen.add(key); return true;
    });
}
function mutImputeMissing() {
    const n = APP.data.length;
    const fills = {};
    for (const c of APP.columns) {
        const m = countMissing(c);
        if (m === 0 || m === n) continue; // colonnes complètes ou vides ignorées
        if (isNumericCol(c)) {
            const v = numericValues(c).sort((a, b) => a - b);
            fills[c] = v.length % 2 ? v[(v.length - 1) / 2] : (v[v.length / 2 - 1] + v[v.length / 2]) / 2; // médiane
        } else {
            const freq = {};
            for (const r of APP.data) { const x = r[c]; if (!isNull(x)) freq[x] = (freq[x] || 0) + 1; }
            fills[c] = Object.entries(freq).sort((a, b) => b[1] - a[1])[0]?.[0]; // mode
        }
    }
    APP.data = APP.data.map(r => {
        let nr = null;
        for (const c in fills) if (isNull(r[c])) { nr = nr || { ...r }; nr[c] = fills[c]; }
        return nr || r;
    });
    return fills;
}
function mutAutoDoc() {
    const docs = { ...APP.variableDocs };
    const added = [];
    for (const c of APP.columns) if (!docs[c] || !docs[c].description) { docs[c] = { ...(docs[c] || {}), ...autoDescribe(c) }; added.push(c); }
    APP.variableDocs = docs;
    return added;
}
function mutLicense() { APP.metadata = { ...APP.metadata, license: APP.metadata.license || 'CC-BY 4.0' }; }
function mutMetaPlaceholder() {
    const keys = ['title', 'author', 'description', 'keywords', 'version', 'contact', 'collection_method', 'geographic_area', 'citation', 'access_conditions'];
    const m = { ...APP.metadata };
    for (const k of keys) if (!m[k]) m[k] = '·';
    APP.metadata = m;
}
function sensitiveColumns() {
    const kw = ['nom', 'name', 'prenom', 'surname', 'telephone', 'phone', 'email', 'adresse', 'address', 'ssn', 'cin', 'passport'];
    return APP.columns.filter(c => kw.some(k => c.toLowerCase().includes(k)));
}
function mutAnonymize(cols) {
    const targets = (cols || sensitiveColumns()).filter(c => !(APP.anonymizedCols || []).includes(c));
    if (!targets.length) return targets;
    const maps = {};
    for (const c of targets) maps[c] = new Map();
    APP.data = APP.data.map(r => {
        let nr = null;
        for (const c of targets) {
            const v = r[c];
            if (isNull(v)) continue;
            const m = maps[c];
            if (!m.has(v)) m.set(v, c.replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 4) + '_' + (m.size + 1));
            nr = nr || { ...r };
            nr[c] = m.get(v);
        }
        return nr || r;
    });
    APP.anonymizedCols = [...new Set([...(APP.anonymizedCols || []), ...targets])];
    return targets;
}

// ── Catalogue d'actions : gains calculés par simulation ──
function buildAssistantActions() {
    const fp = [APP.editCount, APP.data.length, APP.columns.length, Object.keys(APP.variableDocs).length,
        Object.values(APP.metadata).filter(Boolean).length, (APP.anonymizedCols || []).length].join('|');
    if (APP._assistCache && APP._assistCache.fp === fp) return APP._assistCache;

    APP.qualityReport = APP.qualityReport || analyzeQuality();
    APP.fairScore = APP.fairScore || computeFAIR();
    APP.aiScore = APP.aiScore || computeAI();
    const current = computeAQI().total;
    const n = APP.data.length;
    const actions = [];

    const emptyCols = APP.columns.filter(c => countMissing(c) === n);
    if (emptyCols.length) actions.push({
        id: 'empty', icon: '🗑️', label: `Supprimer ${emptyCols.length} colonne(s) vide(s)`,
        why: `${emptyCols.join(', ')} : aucune information, dégrade la structure.`,
        gain: simulateAQI(mutDropEmptyCols) - current, auto: true, manualStep: 2
    });

    if (countDuplicates() > 0) actions.push({
        id: 'dup', icon: '♻️', label: `Supprimer ${countDuplicates()} doublon(s)`,
        why: 'Des lignes identiques biaisent les statistiques et les modèles.',
        gain: simulateAQI(mutDedupe) - current, auto: true, manualStep: 2
    });

    let totalMiss = 0; APP.columns.forEach(c => { const m = countMissing(c); if (m < n) totalMiss += m; });
    if (totalMiss > 0) actions.push({
        id: 'missing', icon: '🧩', label: `Imputer ${totalMiss} valeur(s) manquante(s)`,
        why: emptyCols.length ? 'Après suppression des colonnes vides : médiane pour les numériques, mode pour les catégorielles.' : 'Médiane pour les numériques, mode pour les catégorielles.',
        gain: simulateAQI(mutImputeMissing) - current, auto: true, manualStep: 2
    });

    const undoc = APP.columns.filter(c => !APP.variableDocs[c] || !APP.variableDocs[c].description);
    if (undoc.length) actions.push({
        id: 'doc', icon: '📖', label: `Documenter ${undoc.length} variable(s) (suggestions auto)`,
        why: 'Descriptions générées depuis les données, modifiables à l\'étape 3.',
        gain: simulateAQI(mutAutoDoc) - current, auto: true, manualStep: 3
    });

    if (!APP.metadata.license) actions.push({
        id: 'license', icon: '⚖️', label: 'Ajouter une licence (CC-BY 4.0)',
        why: 'Sans licence, les données ne sont ni FAIR ni réutilisables.',
        gain: simulateAQI(mutLicense) - current, auto: true, manualStep: 4
    });

    const metaMissing = ['title', 'author', 'description', 'keywords', 'contact'].filter(k => !APP.metadata[k]);
    if (metaMissing.length) actions.push({
        id: 'meta', icon: '📋', label: `Compléter ${metaMissing.length} métadonnée(s) clé(s)`,
        why: `${metaMissing.join(', ')} : à renseigner vous-même (étape 4).`,
        gain: simulateAQI(mutMetaPlaceholder) - current, auto: false, manualStep: 4
    });

    const piiPending = sensitiveColumns().filter(c => !(APP.anonymizedCols || []).includes(c));
    if (piiPending.length) actions.push({
        id: 'anon', icon: '🔒', label: `Pseudonymiser ${piiPending.length} colonne(s) sensible(s)`,
        why: `${piiPending.join(', ')} : remplace les valeurs identifiantes par des codes (RGPD).`,
        gain: simulateAQI(() => mutAnonymize(piiPending)) - current, auto: true, manualStep: 7
    });

    const result = { fp, current, actions: actions.filter(a => a.gain > 0).sort((a, b) => b.gain - a.gain).slice(0, 5) };
    APP._assistCache = result;
    return result;
}

function pushAqiHistory(label) {
    const score = computeAQI().total;
    const last = APP.aqiHistory[APP.aqiHistory.length - 1];
    if (last && last.score === score) return;
    APP.aqiHistory.push({ label, score });
}

// Applique réellement une action de l'assistant
function applyAssistAction(id) {
    pushUndoSnapshot('Correction automatique de l assistant');
    if (id === 'empty') { const dropped = mutDropEmptyCols(); addHistory('Assistant : colonnes vides supprimées', dropped.join(', '), 'Correction automatique'); }
    else if (id === 'dup') { const before = APP.data.length; mutDedupe(); addHistory('Assistant : doublons supprimés', `${before - APP.data.length} ligne(s)`, 'Correction automatique'); }
    else if (id === 'missing') { const fills = mutImputeMissing(); addHistory('Assistant : valeurs manquantes imputées', Object.keys(fills).map(c => `${c}→${fills[c]}`).join(' ; '), 'Médiane/mode automatique'); }
    else if (id === 'doc') { const added = mutAutoDoc(); addHistory('Assistant : variables documentées', `${added.length} suggestion(s) automatique(s)`, 'À relire à l\'étape 3'); }
    else if (id === 'license') { mutLicense(); addHistory('Assistant : licence ajoutée', 'CC-BY 4.0', 'Correction automatique'); }
    else if (id === 'anon') { const done = mutAnonymize(); addHistory('Assistant : pseudonymisation', done.join(', '), 'Valeurs remplacées par des codes (RGPD)'); }
    notify('Correction automatique appliquée. Les scores et le rapport qualité ont été recalculés.');
    APP._assistCache = null;
    pushAqiHistory('Assistant');
    renderNav(); renderStep();
}

function applyAllAssistActions() {
    const { actions } = buildAssistantActions();
    pushUndoSnapshot('Correction automatique globale');
    for (const a of actions) if (a.auto) {
        if (a.id === 'empty') mutDropEmptyCols();
        else if (a.id === 'dup') mutDedupe();
        else if (a.id === 'missing') mutImputeMissing();
        else if (a.id === 'doc') mutAutoDoc();
        else if (a.id === 'license') mutLicense();
        else if (a.id === 'anon') mutAnonymize();
    }
    addHistory('Assistant : correction automatique globale', actions.filter(a => a.auto).map(a => a.label).join(' ; '), 'Toutes les corrections auto');
    APP._assistCache = null;
    notify('Correction globale appliquée. La base, les scores et les exports utilisent maintenant les données mises à jour.');
    pushAqiHistory('Correction globale');
    renderNav(); renderStep();
}

// ── Barre Objectif AQI (permanente en haut de chaque étape) ──
function renderObjectiveBar() {
    if (!APP.data || !APP.data.length) return '';
    const { current, actions } = buildAssistantActions();
    const remaining = Math.max(0, AQI_TARGET - current);
    const ratio = clamp(current / AQI_TARGET, 0, 1);
    const color = current >= AQI_TARGET ? '#1B5E20' : current >= 60 ? '#2E7D32' : current >= 40 ? '#F57F17' : '#C62828';
    const totalGain = actions.reduce((s, a) => s + a.gain, 0);

    let html = `<div class="card" style="border-left:5px solid ${color};margin-bottom:1.2rem">
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:1rem;justify-content:space-between">
            <div style="flex:1;min-width:220px">
                <div style="font-size:.8rem;color:#888;font-weight:600">🎯 Objectif recommandé : AQI ≥ ${AQI_TARGET}</div>
                <div style="background:#eee;border-radius:8px;height:14px;margin:.4rem 0;overflow:hidden">
                    <div style="width:${ratio * 100}%;height:100%;background:${color};border-radius:8px;transition:width .4s"></div>
                </div>
                <div style="font-size:.85rem"><strong style="color:${color};font-size:1.05rem">AQI actuel : ${current}/100</strong>
                ${current >= AQI_TARGET ? ' · 🎉 Objectif atteint !' : ` · encore <strong>${remaining} point(s)</strong> à gagner`}</div>
            </div>`;
    if (actions.length) {
        html += `<button class="btn btn-primary" onclick="applyAllAssistActions()" title="Applique toutes les corrections automatiques">⚡ Tout corriger auto (+${actions.filter(a => a.auto).reduce((s, a) => s + a.gain, 0)})</button>`;
    }
    html += `</div>`;

    if (actions.length) {
        html += `<details style="margin-top:.6rem"><summary style="cursor:pointer;font-size:.88rem;font-weight:600;color:#2E7D32">💡 ${actions.length} action(s) prioritaire(s) : gain potentiel +${totalGain} point(s)</summary>
        <div style="margin-top:.6rem">`;
        for (const a of actions) {
            html += `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;padding:.5rem .7rem;background:#f8faf8;border-radius:8px;margin:.3rem 0">
                <span style="font-size:1.1rem">${a.icon}</span>
                <div style="flex:1;min-width:200px"><strong style="font-size:.87rem">${a.label}</strong> <span style="color:${a.gain > 0 ? 'var(--primary)' : '#888'};font-weight:700">+${a.gain}</span><br>
                <span style="font-size:.78rem;color:#777">${a.why}</span></div>
                ${a.auto ? `<button class="btn btn-primary btn-sm" onclick="applyAssistAction('${a.id}')">✅ Corriger auto</button>` : ''}
                <button class="btn btn-secondary btn-sm" onclick="goStep(${a.manualStep})">✏️ Manuel</button>
            </div>`;
        }
        html += `</div></details>`;
    } else if (current < AQI_TARGET) {
        html += `<p style="font-size:.82rem;color:#888;margin-top:.4rem">Les points restants nécessitent des actions manuelles (métadonnées, documentation fine, anonymisation).</p>`;
    }
    html += `</div>`;
    return html;
}

// MODE PROJET : persistance locale (IndexedDB, 100% sur l'appareil)
// ═══════════════════════════════════════════════════════════════
const DB_NAME = 'afridata_projects', DB_STORE = 'projects';

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath: 'id' });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbPut(project) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(project);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
    });
}

async function dbGetAll() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const req = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).getAll();
        req.onsuccess = () => { db.close(); resolve(req.result || []); };
        req.onerror = () => { db.close(); reject(req.error); };
    });
}

async function dbGet(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const req = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).get(id);
        req.onsuccess = () => { db.close(); resolve(req.result); };
        req.onerror = () => { db.close(); reject(req.error); };
    });
}

async function dbDelete(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).delete(id);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
    });
}

// Instantané complet de l'état de travail (workbook exclu : trop lourd, reconstruit à l'import)
function serializeState() {
    return {
        step: typeof APP.step === 'number' ? APP.step : 1,
        data: APP.data, originalData: APP.originalData,
        initialStats: APP.initialStats, baseline: APP.baseline, dataVersionLabel: APP.dataVersionLabel,
        inputFormat: APP.inputFormat, columns: APP.columns, fileName: APP.fileName,
        variableDocs: APP.variableDocs, metadata: APP.metadata,
        editHistory: APP.editHistory, editCount: APP.editCount, undoStack: APP.undoStack,
        sheetNames: APP.sheetNames, activeSheet: APP.activeSheet,
        aqiHistory: APP.aqiHistory, anonymizedCols: APP.anonymizedCols
    };
}

function restoreState(s) {
    APP.data = s.data; APP.originalData = s.originalData;
    APP.initialStats = s.initialStats; APP.baseline = s.baseline; APP.dataVersionLabel = s.dataVersionLabel || 'Original';
    APP.inputFormat = s.inputFormat || 'csv'; APP.columns = s.columns || []; APP.fileName = s.fileName || '';
    APP.variableDocs = s.variableDocs || {}; APP.metadata = s.metadata || {};
    APP.editHistory = s.editHistory || []; APP.editCount = s.editCount || 0; APP.undoStack = s.undoStack || [];
    APP.sheetNames = s.sheetNames || []; APP.activeSheet = s.activeSheet || '';
    APP.aqiHistory = s.aqiHistory || [];
    APP._assistCache = null;
    APP.workbook = null;
    APP.qualityReport = null; APP.fairScore = null; APP.aiScore = null; APP.aqiScore = null;
    APP.editPage = 0;
    APP.step = s.step || 1;
}

    if (APP.mode !== 'project' || !APP.projectId) return;
    clearTimeout(_autosaveTimer);

async function saveProject(silent) {
    if (!APP.projectId) return;
    const existing = await dbGet(APP.projectId) || {};
    await dbPut({
        id: APP.projectId,
        name: APP.projectName || existing.name || 'Projet sans nom',
        description: existing.description || '',
        createdAt: existing.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        state: serializeState()
    });
    APP.lastSaved = new Date().toLocaleTimeString('fr-FR');
    const el = document.getElementById('save-indicator');
    if (el) el.textContent = '💾 Sauvegardé à ' + APP.lastSaved;
    if (!silent) renderNav();
}

async function createProject(name, description, fromCurrentWork) {
    const id = 'prj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    APP.projectId = id;
    APP.projectName = name || 'Projet sans nom';
    APP.mode = 'project';
    await dbPut({
        id, name: APP.projectName, description: description || '',
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        state: fromCurrentWork ? serializeState() : null
    });
    APP.lastSaved = new Date().toLocaleTimeString('fr-FR');
    if (!fromCurrentWork) { APP.step = 1; }
    renderNav(); renderStep();
}

async function openProject(id) {
    const p = await dbGet(id);
    if (!p) { toast('Projet introuvable.', 'error'); return; }
    APP.mode = 'project';
    APP.projectId = p.id;
    APP.projectName = p.name;
    if (p.state && p.state.data) restoreState(p.state);
    else APP.step = 1;
    APP.lastSaved = new Date(p.updatedAt).toLocaleTimeString('fr-FR');
    renderNav(); renderStep();
    window.scrollTo({ top: 0 });
}

async function deleteProject(id, name) {
    if (!confirm(`Supprimer définitivement le projet « ${name} » ?`)) return;
    await dbDelete(id);
    if (APP.projectId === id) { APP.projectId = null; APP.projectName = ''; APP.mode = null; }
    goStep('projects');
}

function saveAsProject() {
    const name = prompt('Nom du projet :', APP.metadata.title || APP.fileName || 'Mon projet');

    createProject(name, '', true);
}

// ── Export / import de projet (fichier .afridata, transférable) ──
async function exportProjectFile(id) {
    const p = await dbGet(id);
    if (!p) { toast('Projet introuvable.', 'error'); return; }
    const payload = { format: 'afridata-project', version: 1, exportedAt: new Date().toISOString(), project: p };
    const blob = new Blob([JSON.stringify(payload)], { type: 'application/json;charset=utf-8;' });
    const safe = String(p.name || 'projet').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || 'projet';
    saveAs(blob, `${safe}.afridata`);
}

function importProjectFile(file) {
    const reader = new FileReader();
    reader.onload = async e => {
        try {
            const payload = JSON.parse(e.target.result);
            if (payload.format !== 'afridata-project' || !payload.project) throw new Error('Ce fichier n\'est pas un projet AfriData Ready valide.');
            const p = payload.project;
            // Nouvel identifiant pour éviter d'écraser un projet existant
            p.id = 'prj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
            p.name = (p.name || 'Projet importé') + ' (importé)';
            p.updatedAt = new Date().toISOString();
            await dbPut(p);
            toast(`Projet « ${p.name} » importé avec succès.`, 'success');
            loadProjectsList();
        } catch (err) { toast('Import impossible : ' + err.message, 'error'); }
    };
    reader.readAsText(file);
}

function proDatasetSummary() {
    if (!APP.data || !APP.data.length) return {
        status: 'no_dataset',
        message: 'Aucun jeu de données importé.'
    };
    const q = APP.qualityReport || analyzeQuality();
    const fair = APP.fairScore || computeFAIR();
    const ai = APP.aiScore || computeAI();
    const aqi = APP.aqiScore || computeAQI();
    const numericCols = APP.columns.filter(c => isNumericCol(c));
    const missingCols = APP.columns
        .map(c => ({ column: c, missing: countMissing(c), pct: pct(countMissing(c), APP.data.length) }))
        .filter(x => x.missing > 0)
        .sort((a, b) => b.missing - a.missing)
        .slice(0, 10);
    const outlierCols = Object.entries(q.outlierDetails || {}).map(([column, detail]) => ({
        column,
        count: detail.count,
        normal_range: [detail.lo, detail.hi]
    }));
    const similarCols = Object.entries(q.similarValueDetails || {}).map(([column, groups]) => ({
        column,
        groups: groups.length,
        examples: groups.slice(0, 3).map(g => ({ values_count: g.values.length, proposed_target: g.target, rows: g.count }))
    }));
    return {
        status: 'ready',
        file_name: APP.fileName || 'dataset',
        rows: APP.data.length,
        columns: APP.columns.length,
        column_names: APP.columns,
        numeric_columns: numericCols,
        categorical_columns: APP.columns.filter(c => !numericCols.includes(c)),
        quality: {
            missing_values: q.totalMissing,
            missing_percent: q.missingPct,
            duplicates: q.n_duplicates,
            empty_columns: q.emptyCols,
            missing_columns_top: missingCols,
            outlier_columns: outlierCols,
            similar_value_columns: similarCols
        },
        documentation: {
            documented_columns: APP.columns.filter(c => APP.variableDocs[c] && APP.variableDocs[c].description).length,
            total_columns: APP.columns.length,
            metadata_present: Object.entries(APP.metadata || {}).filter(([, v]) => Boolean(v)).map(([k]) => k),
            metadata_missing: ['title', 'author', 'description', 'license', 'contact'].filter(k => !APP.metadata[k])
        },
        scores: {
            aqi: aqi.total,
            fair: fair.total,
            ai_readiness: ai.total
        },
        privacy_note: 'Ce résumé ne contient pas les lignes brutes du fichier. Il transmet surtout des indicateurs, noms de colonnes et statistiques.'
    };
}

function buildProPrompt(question) {
    const summary = proDatasetSummary();
    const q = question || "Analyse ce jeu de données et propose les priorités d'amélioration.";
    return `Tu es l'assistant Pro d'AfriData Ready. Reponds en francais clair, professionnel et actionnable.

Objectif :
- expliquer l'etat du jeu de donnees ;
- prioriser les corrections ;
- proposer des formulations utiles pour un rapport ou une presentation ;
- ne pas inventer de faits absents du resume.

Question utilisateur :
${q}

Resume securise du jeu de donnees :
${JSON.stringify(summary, null, 2)}

Format attendu :
1. Diagnostic rapide
2. Priorites de correction
3. Recommandations FAIR / AI-ready
4. Texte court pret a coller dans un rapport`;
}

function localProAdvice(question) {
    if (!APP.data || !APP.data.length) {
        return "Importez d'abord un fichier pour activer l'analyse Pro du jeu de donnees.";
    }
    const q = APP.qualityReport || analyzeQuality();
    const fair = APP.fairScore || computeFAIR();
    const ai = APP.aiScore || computeAI();
    const aqi = APP.aqiScore || computeAQI();
    const assist = buildAssistantActions();
    const missingMeta = ['title', 'author', 'description', 'license', 'contact'].filter(k => !APP.metadata[k]);
    const lines = [];
    lines.push(`Diagnostic rapide\nAQI actuel : ${aqi.total}/100. Score FAIR : ${fair.total}/100. AI Readiness : ${ai.total}/100.`);
    lines.push(`Le fichier contient ${APP.data.length} ligne(s), ${APP.columns.length} colonne(s), ${q.totalMissing} valeur(s) manquante(s), ${q.n_duplicates} doublon(s) et ${Object.keys(q.outlierDetails || {}).length} colonne(s) avec valeurs aberrantes.`);
    if (assist.actions.length) {
        lines.push(`\nPriorites de correction\n${assist.actions.map((a, i) => `${i + 1}. ${a.label} : ${a.why} Gain estime : +${a.gain} point(s).`).join('\n')}`);
    } else {
        lines.push("\nPriorites de correction\nAucune correction automatique majeure n'est disponible. Les gains restants viendront surtout de la documentation, des metadonnees et de la validation metier.");
    }
    lines.push(`\nRecommandations FAIR / AI-ready\nDocumenter ${APP.columns.length - APP.columns.filter(c => APP.variableDocs[c] && APP.variableDocs[c].description).length} variable(s) restante(s). Completer les metadonnees manquantes : ${missingMeta.length ? missingMeta.join(', ') : 'aucune metadonnee cle manquante'}.`);
    lines.push(`\nTexte court pret a coller dans un rapport\nLe jeu de donnees "${APP.fileName || 'analyse'}" a ete evalue avec AfriData Ready. L'analyse signale un score AQI de ${aqi.total}/100, un score FAIR de ${fair.total}/100 et un score AI Readiness de ${ai.total}/100. Les priorites portent sur la qualite des donnees, la documentation des variables et la completion des metadonnees avant publication ou reutilisation analytique.`);
    if (question) lines.push(`\nQuestion traitee\n${question}`);
    return lines.join('\n');
}

async function askProAssistant() {
    const question = document.getElementById('pro-question')?.value.trim() || '';
    const prompt = buildProPrompt(question);
    APP.proLastPrompt = prompt;
    if (!APP.data || !APP.data.length) {
        APP.proAnswer = localProAdvice(question);
        APP.proStatus = 'Mode local : aucun fichier importe.';
        renderStep();
        return;
    }
    if (!APP.proEndpoint) {
        APP.proAnswer = localProAdvice(question);
        APP.proStatus = 'Mode local : aucun endpoint Supabase configure.';
        renderStep();
        return;
    }
    showLoading('Assistant Pro en cours...');
    try {
        const res = await fetch(APP.proEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, model: APP.proModel || 'openai/gpt-4o-mini', temperature: 0.2 })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || data.message || `Erreur HTTP ${res.status}`);
        APP.proAnswer = data.answer || data.content || JSON.stringify(data, null, 2);
        APP.proStatus = 'Analyse IA generee via Supabase/OpenRouter.';
        toast('Analyse Pro générée.', 'success');
    } catch (err) {
        APP.proAnswer = localProAdvice(question);
        APP.proStatus = `Endpoint indisponible (${err.message}). Repli sur l'analyse locale.`;
        toast('Endpoint Pro indisponible : analyse locale affichée.', 'info', 5000);
    } finally {
        hideLoading();
        renderStep();
    }
}

async function copyProPrompt() {
    const prompt = APP.proLastPrompt || buildProPrompt(document.getElementById('pro-question')?.value.trim() || '');
    try {
        await navigator.clipboard.writeText(prompt);
        toast('Prompt Pro copié.', 'success');
    } catch (e) {
        APP.proLastPrompt = prompt;
        toast('Copie impossible automatiquement. Le prompt reste visible dans la page.', 'info');
        renderStep();
    }
}

function renderPro() {
    const hasData = APP.data && APP.data.length;
    const q = hasData ? (APP.qualityReport || analyzeQuality()) : null;
    const aqi = hasData ? (APP.aqiScore || computeAQI()) : null;
    const endpointHint = 'https://TON_PROJECT_REF.supabase.co/functions/v1/openrouter-chat';
    return `${stepHeaderHTML('pro')}
    <div class="card" style="border-left:5px solid var(--accent)">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
            <div>
                <span class="pro-badge">Version Pro pilote</span>
                <h3 style="border:none;margin:.6rem 0 .25rem">Assistant IA pour qualite, documentation et rapport</h3>
                <p style="color:var(--text-muted);font-size:.9rem;max-width:760px">Cette page prepare la future offre Pro : l'application reste utilisable localement, puis peut appeler une Edge Function Supabase pour obtenir une analyse IA sans exposer la cle OpenRouter.</p>
            </div>
            <button class="btn btn-secondary" onclick="goStep(1)">Importer un fichier</button>
        </div>
    </div>

    <div class="pro-grid">
        <div>
            <div class="card">
                <h3>1. Configuration du backend Pro</h3>
                <div class="form-group">
                    <label>Endpoint Supabase Edge Function</label>
                    <input id="pro-endpoint" value="${escapeHtml(APP.proEndpoint)}" placeholder="${endpointHint}">
                </div>
                <div class="form-group">
                    <label>Modele OpenRouter</label>
                    <input id="pro-model" value="${escapeHtml(APP.proModel)}" placeholder="openai/gpt-4o-mini">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="saveProConfig()">Enregistrer la configuration</button>
                    <button class="btn btn-secondary" onclick="APP.proEndpoint='';try{localStorage.removeItem('afridata_pro_endpoint')}catch(e){};renderStep()">Mode local</button>
                </div>
                <p style="font-size:.78rem;color:var(--text-muted);margin-top:.7rem">Sans endpoint, l'assistant utilise une analyse locale. Avec Supabase, seul un resume securise est envoye par defaut.</p>
            </div>

            <div class="card">
                <h3>2. Question a poser a l'assistant</h3>
                <div class="form-group">
                    <textarea id="pro-question" rows="4" placeholder="Ex : Que dois-je corriger en priorite avant de presenter ce fichier ?"></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="askProAssistant()">✨ Generer l'analyse Pro</button>
                    <button class="btn btn-secondary" onclick="copyProPrompt()">Copier le prompt</button>
                </div>
                ${APP.proStatus ? `<p style="margin-top:.7rem;color:var(--text-muted);font-size:.82rem">${escapeHtml(APP.proStatus)}</p>` : ''}
            </div>

            <div class="card">
                <h3>3. Reponse Pro</h3>
                <div class="pro-response">${APP.proAnswer ? escapeHtml(APP.proAnswer) : "L'analyse apparaitra ici. En mode local, elle s'appuie sur les scores, problemes et recommandations deja calcules par AfriData Ready."}</div>
            </div>
        </div>

        <aside>
            <div class="pro-panel">
                <h3 style="border:none;margin-bottom:.5rem">Resume transmis</h3>
                ${hasData ? `<div class="pro-kpi-row">
                    <div class="pro-kpi"><strong>${APP.data.length}</strong><span>Lignes</span></div>
                    <div class="pro-kpi"><strong>${APP.columns.length}</strong><span>Colonnes</span></div>
                    <div class="pro-kpi"><strong>${q.totalMissing}</strong><span>Valeurs manquantes</span></div>
                    <div class="pro-kpi"><strong>${aqi.total}/100</strong><span>AQI</span></div>
                </div>
                <p style="font-size:.82rem;color:var(--text-muted)">Le resume ne contient pas les lignes brutes. Il contient les noms de colonnes, les scores, les statistiques de qualite et les priorites de correction.</p>` :
                `<p style="font-size:.9rem;color:var(--text-muted)">Aucun fichier importe. Importez un jeu de donnees pour produire un resume Pro.</p>`}
            </div>
            <div class="card">
                <h3>Fonctions Pro prevues</h3>
                <div class="issue info">✨ Diagnostic explique en langage clair</div>
                <div class="issue info">📖 Brouillon de dictionnaire de donnees</div>
                <div class="issue info">📋 Resume executif pour rapport</div>
                <div class="issue info">🏢 Profils metier : sante, education, ONG, recherche</div>
            </div>
            <details class="card">
                <summary style="cursor:pointer;font-weight:700;color:var(--primary)">Voir le prompt prepare</summary>
                <pre style="white-space:pre-wrap;font-size:.75rem;color:#455;max-height:360px;overflow:auto;margin-top:.8rem">${escapeHtml(APP.proLastPrompt || buildProPrompt(''))}</pre>
            </details>
        </aside>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════
function renderStep() {
    const container = document.getElementById('main-content');
    const renderers = {
        1: renderStep1, 2: renderStep2, 3: renderStep4, 4: renderStep5,
        5: renderStep6, 6: renderStep7, 7: renderGovernance, 8: renderAnalysis, 9: renderStep9,
        analysis: renderAnalysis, pro: renderPro, referentiel: renderReferentiel, about: renderAbout,
        welcome: renderWelcome, projects: renderProjects
    };
    const showBar = APP.data && APP.data.length && (typeof APP.step === 'number' || APP.step === 'analysis');
    container.innerHTML = (showBar ? renderObjectiveBar() : '') + (showBar ? renderDataStateBar() : '') + renderUndoToolbar() + renderNotice() + renderers[APP.step]();
    updateFileInfo();

    // Post-render hooks
    if (APP.step === 3 && APP.data) setTimeout(() => renderDocForm(), 50);
    document.querySelectorAll('.outlier-action').forEach(btn => {
        btn.addEventListener('click', () => {
            const col = btn.dataset.col;
            const method = btn.dataset.method;
            if (!col || !method) return;
            if (method === 'drop') {
                const count = btn.dataset.count || '';
                const message = `Supprimer les ${count} ligne(s) contenant une valeur aberrante de "${col}" ?`;
                if (!confirm(message)) return;
            }
            fixOutliers(col, method);
        });
    });
    document.querySelectorAll('.missing-action').forEach(btn => {
        btn.addEventListener('click', () => {
            const col = document.getElementById('fill-col')?.value;
            const method = document.getElementById('fill-method')?.value;
            const custom = document.getElementById('fill-custom')?.value ?? '';
            fillMissing(col, method, custom);
        });
    });
    document.querySelectorAll('.similar-action').forEach(btn => {
        btn.addEventListener('click', () => {
            const row = btn.closest('.similar-row');
            if (!row) return;
            let values = [];
            try { values = JSON.parse(row.dataset.values || '[]'); }
            catch (e) { toast('Impossible de lire le groupe de valeurs.', 'error'); return; }
            const target = row.querySelector('.similar-target')?.value ?? '';
            applySimilarValues(row.dataset.col, values, target);
        });
    });
    document.querySelectorAll('.governance-anonymize').forEach(btn => {
        btn.addEventListener('click', () => {
            const col = btn.dataset.col;
            if (col) anonymizeOneColumn(col);
        });
    });

    // Drag and drop for step 1
    if (APP.step === 1) {
        const zone = document.getElementById('upload-zone');
        if (zone) {
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
        }
    }
}

// Init : écran d'accueil (choix du mode)
try { document.documentElement.lang = APP.lang; } catch (e) {}
APP.step = 'welcome';
renderNav();
renderStep();
</script>
</body>
